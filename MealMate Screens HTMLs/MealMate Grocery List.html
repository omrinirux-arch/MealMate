<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MealMate — Grocery List</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { margin: 0; background: #c9c2ba; }
    body { display: flex; justify-content: center; font-family: 'DM Sans', sans-serif; }
    #root {
      position: fixed; top: 0; bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 390px;
      display: flex; flex-direction: column; overflow: hidden;
    }
    button, input { font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const C = {

  secondary: { 50:"#fdf5f0",100:"#fae8dc",200:"#f4cdb5",300:"#edae88",400:"#e08c5a",500:"#d4723e",600:"#bf5c2e",700:"#9e4a27" },
  neutral:   { 0:"#ffffff",50:"#faf8f6",100:"#f3f0ec",200:"#e8e3dd",300:"#d4cdc4",400:"#b5aca0",500:"#968b7d",600:"#7a6f63",700:"#615851",800:"#4a4340",900:"#352f2d",950:"#1e1b19" },

const shadow = {
  sm: "0 1px 3px rgba(53,47,45,0.07), 0 1px 2px rgba(53,47,45,0.04)",
  md: "0 4px 12px rgba(53,47,45,0.09), 0 2px 4px rgba(53,47,45,0.05)",

const THEMES = {
  Calm: {
    appBg: C.neutral[50], headerBg: C.neutral[0], headerBorder: C.neutral[200],
    heading: C.neutral[900], subtext: C.neutral[500],
    sectionLabelBg: C.neutral[50], sectionLabel: C.neutral[500],
    rowBg: C.neutral[0], rowBorder: C.neutral[100],
    rowCheckedBg: C.neutral[50], nameColor: C.neutral[900], nameChecked: C.neutral[400],
    qtyColor: C.neutral[600], qtyChecked: C.neutral[400],
    recipeColor: C.neutral[400],
    checkBorder: C.neutral[300], checkBg: C.primary[500],
    fabBg: C.primary[600], fabShadow: "rgba(74,122,74,0.35)",
    shareBg: C.neutral[100], shareBorder: C.neutral[200], shareColor: C.neutral[600],
    badgeBg: C.primary[100], badgeText: C.primary[700],
    addInputBg: C.neutral[0], addInputBorder: C.primary[300],
    progressBg: C.neutral[100], progressFill: C.primary[500],
    dividerColor: C.neutral[100],
    sectionCardBg: C.neutral[0], sectionCardBorder: C.neutral[200],
  },
  Warm: {
    appBg: "#fdf5f0", headerBg: "#fffaf7", headerBorder: C.secondary[200],
    heading: C.neutral[900], subtext: C.neutral[600],
    sectionLabelBg: "#fdf5f0", sectionLabel: C.neutral[500],
    rowBg: "#fffaf7", rowBorder: C.secondary[100],
    rowCheckedBg: C.secondary[50], nameColor: C.neutral[900], nameChecked: C.neutral[400],
    qtyColor: C.neutral[600], qtyChecked: C.neutral[400],
    recipeColor: C.neutral[400],
    checkBorder: C.neutral[300], checkBg: C.secondary[500],
    fabBg: C.secondary[500], fabShadow: "rgba(191,92,46,0.35)",
    shareBg: C.secondary[50], shareBorder: C.secondary[200], shareColor: C.secondary[700],
    badgeBg: C.secondary[100], badgeText: C.secondary[700],
    addInputBg: "#fffaf7", addInputBorder: C.secondary[300],
    progressBg: C.secondary[100], progressFill: C.secondary[500],
    dividerColor: C.secondary[100],
    sectionCardBg: "#fffaf7", sectionCardBorder: C.secondary[200],
  },
  Bold: {
    appBg: C.neutral[950], headerBg: "#1e1b19", headerBorder: "#3a342e",
    heading: "#f3f0ec", subtext: C.neutral[400],
    sectionLabelBg: C.neutral[950], sectionLabel: C.neutral[500],
    rowBg: "#2a2520", rowBorder: "#3a342e",
    rowCheckedBg: "#242019", nameColor: "#e8e3dd", nameChecked: C.neutral[600],
    qtyColor: C.neutral[400], qtyChecked: C.neutral[600],
    recipeColor: C.neutral[600],
    checkBorder: "#5a5248", checkBg: C.primary[500],
    fabBg: C.primary[500], fabShadow: "rgba(90,138,90,0.40)",
    shareBg: "#2a2520", shareBorder: "#4a433d", shareColor: C.neutral[400],
    badgeBg: "#2e3a2e", badgeText: C.primary[400],
    addInputBg: "#2a2520", addInputBorder: C.primary[600],
    progressBg: "#3a342e", progressFill: C.primary[500],
    dividerColor: "#3a342e",
    sectionCardBg: "#2a2520", sectionCardBorder: "#4a433d",
  },
};

// ── Grocery data ──────────────────────────────────────────
let itemId = 0;
const mkItem = (name, qty, recipes, checked=false) => ({ id: ++itemId, name, qty, recipes, checked });

const INITIAL_SECTIONS = [
  {
    id:"produce", label:"Produce", emoji:"🥦",
    items: [
      mkItem("Broccoli",        "2 heads",    "Stir Fry · Beef & Broccoli"),
      mkItem("Asparagus",       "1 bunch",    "Baked Salmon"),
      mkItem("Cherry tomatoes", "1 pint",     "Pasta Primavera", true),
      mkItem("Bell peppers",    "3 medium",   "Chicken Stir Fry"),
      mkItem("Zucchini",        "2 medium",   "Pasta Primavera"),
      mkItem("Lemon",           "3",          "Salmon · Chicken Thighs"),
    ],
  },
  {
    id:"meat", label:"Meat & Seafood", emoji:"🐟",
    items: [
      mkItem("Salmon fillets",   "4 × 6 oz",   "Honey Garlic · Baked Salmon"),
      mkItem("Chicken thighs",   "3 lbs",       "Sheet Pan Chicken"),
      mkItem("Ground turkey",    "1.5 lbs",     "Taco Bowls"),
      mkItem("Shrimp",           "1 lb",        "Fried Rice", true),
    ],
  },
  {
    id:"dairy", label:"Dairy & Eggs", emoji:"🥚",
    items: [
      mkItem("Eggs",          "1 dozen",   "Fried Rice"),
      mkItem("Heavy cream",   "½ cup",     "Chicken & Dumplings"),
      mkItem("Butter",        "2 tbsp",    "Pot Roast", true),
    ],
  },
  {
    id:"canned", label:"Canned & Jarred", emoji:"🥫",
    items: [
      mkItem("Diced tomatoes",  "2 cans",   "Tikka Masala"),
      mkItem("Black beans",     "1 can",    "Taco Bowls"),
      mkItem("Coconut milk",    "1 can",    "Tikka Masala · Curry", true),
    ],
  },
  {
    id:"grains", label:"Grains, Pasta & Rice", emoji:"🌾",
    items: [
      mkItem("Jasmine rice",    "2 cups",   "Fried Rice · Stir Fry"),
      mkItem("Pasta",           "12 oz",    "Pasta Primavera", true),
      mkItem("Bread crumbs",    "¼ cup",    "Chicken & Dumplings"),
    ],
  },
  {
    id:"bakery", label:"Bakery", emoji:"🍞",
    items: [
      mkItem("Flour tortillas", "1 pack",  "Enchiladas"),
    ],
  },
];

// ── Icons ─────────────────────────────────────────────────
function IconCheck({ size=13, color="#fff" }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>;
}
function IconShare({ color }) {
  return <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>;
}
function IconPlus({ color="#fff", size=20 }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>;
}
function IconX({ color, size=14 }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>;
}
function IconChevronDown({ color, open }) {
  return <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{ transform: open?"rotate(180deg)":"rotate(0)", transition:"transform 0.2s" }}><path d="M6 9l6 6 6-6"/></svg>;
}

// ── Grocery item row ──────────────────────────────────────
function GroceryRow({ item, onToggle, onRemove, t, isManual }) {
  const [pressed, setPressed] = React.useState(false);
  return (
    <div
      style={{
        display:"flex", alignItems:"center",
        minHeight:52,
        background: item.checked ? t.rowCheckedBg : t.rowBg,
        borderBottom:`1px solid ${t.dividerColor}`,
        opacity: item.checked ? 0.65 : 1,
        transition:"all 0.15s ease",
        paddingRight:12,
      }}
    >
      {/* Checkbox — large tap target */}
      <button
        onPointerDown={() => setPressed(true)}
        onPointerUp={() => { setPressed(false); onToggle(); }}
        onPointerLeave={() => setPressed(false)}
        style={{
          width:52, height:52, flexShrink:0,
          display:"flex", alignItems:"center", justifyContent:"center",
          background:"transparent", border:"none",
          transform: pressed ? "scale(0.88)" : "scale(1)",
          transition:"transform 0.1s ease",
        }}
      >
        <div style={{
          width:24, height:24, borderRadius:7,
          background: item.checked ? t.checkBg : "transparent",
          border:`2px solid ${item.checked ? t.checkBg : t.checkBorder}`,
          display:"flex", alignItems:"center", justifyContent:"center",
          transition:"all 0.15s ease",
          boxShadow: item.checked ? `0 2px 6px ${t.fabShadow}` : "none",
        }}>
          {item.checked && <IconCheck size={13} color="#fff"/>}
        </div>
      </button>

      {/* Content */}
      <div style={{ flex:1, display:"flex", flexDirection:"column", gap:2, paddingTop:2, paddingBottom:2 }}>
        <span style={{
          fontSize:"0.9375rem", fontWeight: item.checked ? 400 : 500,
          color: item.checked ? t.nameChecked : t.nameColor,
          textDecoration: item.checked ? "line-through" : "none",
          textDecorationColor: t.nameChecked,
          lineHeight:1.3,
        }}>
          {item.name}
        </span>
        {item.recipes && !isManual && (
          <span style={{ fontSize:"0.75rem", color: t.recipeColor, lineHeight:1.2 }}>
            {item.recipes}
          </span>
        )}
        {isManual && (
          <span style={{ fontSize:"0.75rem", color: t.recipeColor }}>Added manually</span>
        )}
      </div>

      {/* Qty */}
      <span style={{
        fontSize:"0.875rem", fontWeight:500,
        color: item.checked ? t.qtyChecked : t.qtyColor,
        marginRight: isManual ? 8 : 0,
        textDecoration: item.checked ? "line-through" : "none",
        textDecorationColor: t.qtyChecked,
        flexShrink:0,
      }}>
        {item.qty}
      </span>

      {/* Remove manual item */}
      {isManual && (
        <button onClick={onRemove} style={{ background:"none", border:"none", padding:4, opacity:0.5 }}>
          <IconX color={t.subtext} size={13}/>
        </button>
      )}
    </div>
  );
}

// ── Section card ──────────────────────────────────────────
function SectionCard({ section, onToggleItem, onRemoveManual, t, manualItems }) {
  const [open, setOpen] = React.useState(true);
  const allItems = [
    ...section.items,
    ...manualItems.filter(m => m.section === section.id),
  ];
  const checkedCount = allItems.filter(i => i.checked).length;

  return (
    <div style={{
      background: t.sectionCardBg,
      borderRadius:14,
      border:`1px solid ${t.sectionCardBorder}`,
      boxShadow: shadow.sm,
      overflow:"hidden",
      marginBottom:10,
    }}>
      {/* Section header */}
      <button
        onClick={() => setOpen(o => !o)}
        style={{
          width:"100%", display:"flex", alignItems:"center",
          padding:"11px 14px 11px 16px",
          background:"transparent", border:"none", cursor:"pointer", gap:10,
        }}
      >
        <span style={{ fontSize:"1rem", lineHeight:1, flexShrink:0 }}>{section.emoji}</span>
        <span style={{ flex:1, fontSize:"0.875rem", fontWeight:700, color: t.heading, textAlign:"left" }}>
          {section.label}
        </span>
        {checkedCount > 0 && (
          <span style={{
            fontSize:"0.6875rem", fontWeight:600,
            padding:"1px 7px", borderRadius:9999,
            background: t.badgeBg, color: t.badgeText,
          }}>
            {checkedCount}/{allItems.length}
          </span>
        )}
        <span style={{ fontSize:"0.75rem", color: t.subtext, flexShrink:0, marginRight:4 }}>
          {!checkedCount ? allItems.length : ""} {!open ? "items" : ""}
        </span>
        <IconChevronDown color={t.subtext} open={open}/>
      </button>

      {open && (
        <div style={{ borderTop:`1px solid ${t.dividerColor}` }}>
          {allItems.map(item => (
            <GroceryRow
              key={item.id}
              item={item}
              onToggle={() => onToggleItem(section.id, item.id)}
              onRemove={() => onRemoveManual(item.id)}
              isManual={item.isManual}
              t={t}
            />
          ))}
        </div>
      )}
    </div>
  );
}

// ── Add item sheet ────────────────────────────────────────
function AddItemSheet({ onAdd, onClose, t, sections }) {
  const [name,    setName]    = React.useState("");
  const [qty,     setQty]     = React.useState("");
  const [section, setSection] = React.useState(sections[0].id);

  const handleAdd = () => {
    if (!name.trim()) return;
    onAdd({ name: name.trim(), qty: qty.trim() || "—", section });
    onClose();
  };

  return (
    <div style={{
      position:"absolute", inset:0,
      background:"rgba(0,0,0,0.4)",
      display:"flex", alignItems:"flex-end",
      zIndex:200,
    }}
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}
    >
      <div style={{
        width:"100%", background: t.rowBg,
        borderRadius:"20px 20px 0 0",
        padding:"20px 20px 36px",
        boxShadow: shadow.lg,
        display:"flex", flexDirection:"column", gap:14,
      }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <span style={{ fontSize:"1rem", fontWeight:700, color: t.heading }}>Add an item</span>
          <button onClick={onClose} style={{ background:"none", border:"none", padding:4 }}>
            <IconX color={t.subtext} size={16}/>
          </button>
        </div>

        {/* Name */}
        <input
          autoFocus
          value={name}
          onChange={e => setName(e.target.value)}
          onKeyDown={e => e.key === "Enter" && handleAdd()}
          placeholder="Item name…"
          style={{
            width:"100%", padding:"12px 14px",
            background: t.appBg, border:`1.5px solid ${t.addInputBorder}`,
            borderRadius:10, fontSize:"1rem", color: t.nameColor, outline:"none",
          }}
        />

        {/* Qty */}
        <input
          value={qty}
          onChange={e => setQty(e.target.value)}
          placeholder="Quantity (e.g. 2 lbs)"
          style={{
            width:"100%", padding:"12px 14px",
            background: t.appBg, border:`1.5px solid ${t.sectionCardBorder}`,
            borderRadius:10, fontSize:"1rem", color: t.nameColor, outline:"none",
          }}
        />

        {/* Section select */}
        <div style={{ display:"flex", flexWrap:"wrap", gap:7 }}>
          {sections.map(s => (
            <button
              key={s.id}
              onClick={() => setSection(s.id)}
              style={{
                padding:"6px 12px", borderRadius:9999,
                fontSize:"0.8125rem", fontWeight:500,
                background: section === s.id ? t.checkBg : t.appBg,
                color: section === s.id ? "#fff" : t.subtext,
                border:`1.5px solid ${section === s.id ? t.checkBg : t.sectionCardBorder}`,
                transition:"all 0.12s ease",
              }}
            >
              {s.emoji} {s.label}
            </button>
          ))}
        </div>

        <button
          onClick={handleAdd}
          style={{
            width:"100%", height:50, borderRadius:12,
            background: `linear-gradient(160deg, ${t.fabBg} 0%, ${t.fabBg} 100%)`,
            color:"#fff", fontSize:"1rem", fontWeight:600,
            border:"none", cursor:"pointer",
            boxShadow:`0 4px 16px ${t.fabShadow}`,
          }}
        >
          Add to list
        </button>
      </div>
    </div>
  );
}

// ── Share toast ───────────────────────────────────────────
function ShareToast({ onClose, t }) {
  React.useEffect(() => { const id = setTimeout(onClose, 2200); return () => clearTimeout(id); }, []);
  return (
    <div style={{
      position:"absolute", bottom:90, left:"50%", transform:"translateX(-50%)",
      background: t.checkBg, color:"#fff",
      padding:"10px 20px", borderRadius:9999,
      fontSize:"0.875rem", fontWeight:600,
      boxShadow: shadow.md, zIndex:300,
      whiteSpace:"nowrap",
      animation:"fadeUp 0.2s ease",
    }}>
      ✓ Copied to clipboard
    </div>
  );
}

// ── Tweak defaults ────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "mood": "Warm",
  "sortChecked": "bottom"
}/*EDITMODE-END*/;

// ── App ───────────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const { mood, sortChecked } = tweaks;
  const t = THEMES[mood] || THEMES.Warm;

  const [sections, setSections]     = React.useState(INITIAL_SECTIONS);
  const [manualItems, setManualItems] = React.useState([]);
  const [showAdd,  setShowAdd]       = React.useState(false);
  const [showToast, setShowToast]    = React.useState(false);

  let manualId = 1000;

  const toggleItem = (sectionId, itemId) => {
    setSections(prev => prev.map(s =>
      s.id !== sectionId ? s : {
        ...s,
        items: s.items.map(i => i.id !== itemId ? i : { ...i, checked: !i.checked }),
      }
    ));
    // also handle manual items
    setManualItems(prev => prev.map(i => i.id !== itemId ? i : { ...i, checked: !i.checked }));
  };

  const addManualItem = ({ name, qty, section }) => {
    setManualItems(prev => [...prev, {
      id: Date.now(), name, qty, section,
      recipes: null, isManual: true, checked: false,
    }]);
  };

  const removeManualItem = (id) => setManualItems(prev => prev.filter(i => i.id !== id));

  const totalItems = sections.reduce((n, s) => n + s.items.length, 0) + manualItems.length;
  const checkedTotal = sections.reduce((n, s) => n + s.items.filter(i => i.checked).length, 0)
    + manualItems.filter(i => i.checked).length;

  const handleShare = () => {
    setShowToast(true);
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background: t.appBg, fontFamily:"'DM Sans', sans-serif", position:"relative" }}>

      {/* ── Status bar ── */}
      <div style={{
        height:36, flexShrink:0, background: t.headerBg,
        display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 20px",
      }}>
        <span style={{ fontSize:"0.875rem", fontWeight:600, color: t.heading }}>9:41</span>
        <div style={{ display:"flex", gap:6, alignItems:"center" }}>
          <svg width="16" height="12" viewBox="0 0 16 12" fill={C.neutral[500]}>
            <rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/>
            <rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1"/>
          </svg>
          <svg width="22" height="11" viewBox="0 0 22 11" fill="none">
            <rect x="0.5" y="0.5" width="18" height="10" rx="2.5" stroke={C.neutral[500]} strokeWidth="1"/>
            <rect x="2" y="2" width="14" height="7" rx="1.5" fill={C.neutral[500]}/>
            <path d="M20 3.5v4a2 2 0 0 0 0-4z" fill={C.neutral[500]}/>
          </svg>
        </div>
      </div>

      {/* ── Header ── */}
      <div style={{
        flexShrink:0, background: t.headerBg,
        padding:"10px 20px 12px",
        borderBottom:`1px solid ${t.headerBorder}`,
        display:"flex", alignItems:"center", justifyContent:"space-between",
      }}>
        <div>
          <h1 style={{ fontSize:"1.125rem", fontWeight:700, letterSpacing:"-0.02em", color: t.heading, lineHeight:1 }}>
            Grocery List
          </h1>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:4 }}>
            <span style={{ fontSize:"0.8125rem", color: t.subtext }}>
              {totalItems} items
            </span>
            {checkedTotal > 0 && (
              <>
                <span style={{ color: t.subtext, fontSize:"0.75rem" }}>·</span>
                <span style={{ fontSize:"0.8125rem", color: t.subtext }}>
                  {checkedTotal} in cart
                </span>
                {/* Inline mini bar */}
                <div style={{ flex:1, height:3, borderRadius:9999, background: t.progressBg, maxWidth:60 }}>
                  <div style={{ width:`${(checkedTotal/totalItems)*100}%`, height:"100%", borderRadius:9999, background: t.progressFill, transition:"width 0.3s ease" }}/>
                </div>
              </>
            )}
          </div>
        </div>

        {/* Share button */}
        <button
          onClick={handleShare}
          style={{
            display:"flex", alignItems:"center", gap:6,
            padding:"8px 14px", borderRadius:10,
            background: t.shareBg, border:`1.5px solid ${t.shareBorder}`,
            fontSize:"0.8125rem", fontWeight:600, color: t.shareColor,
            boxShadow: shadow.sm,
          }}
        >
          <IconShare color={t.shareColor}/>
          Share
        </button>
      </div>

      {/* ── Scrollable list ── */}
      <div style={{ flex:1, minHeight:0, overflowY:"auto", padding:"12px 14px 100px" }}>
        {sections.map(section => (
          <SectionCard
            key={section.id}
            section={section}
            onToggleItem={toggleItem}
            onRemoveManual={removeManualItem}
            manualItems={manualItems}
            t={t}
          />
        ))}
        {/* Manual-only items that don't match a section */}
        {manualItems.filter(m => !sections.find(s => s.id === m.section)).length > 0 && (
          <div style={{
            background: t.sectionCardBg, borderRadius:14,
            border:`1px solid ${t.sectionCardBorder}`, overflow:"hidden", boxShadow: shadow.sm, marginBottom:10,
          }}>
            <div style={{ padding:"11px 16px", borderBottom:`1px solid ${t.dividerColor}` }}>
              <span style={{ fontSize:"0.875rem", fontWeight:700, color: t.heading }}>➕ Misc</span>
            </div>
            {manualItems.filter(m => !sections.find(s => s.id === m.section)).map(item => (
              <GroceryRow key={item.id} item={item} onToggle={() => toggleItem(null, item.id)} onRemove={() => removeManualItem(item.id)} isManual t={t}/>
            ))}
          </div>
        )}
      </div>

      {/* ── FAB ── */}
      <button
        onClick={() => setShowAdd(true)}
        style={{
          position:"absolute", bottom:28, right:20,
          width:52, height:52, borderRadius:"50%",
          background: t.fabBg, color:"#fff",
          border:"none", cursor:"pointer",
          display:"flex", alignItems:"center", justifyContent:"center",
          boxShadow:`0 6px 20px ${t.fabShadow}, ${shadow.md}`,
          zIndex:100, transition:"transform 0.1s ease",
        }}
      >
        <IconPlus color="#fff" size={22}/>
      </button>

      {/* ── Add sheet ── */}
      {showAdd && (
        <AddItemSheet onAdd={addManualItem} onClose={() => setShowAdd(false)} t={t} sections={sections}/>
      )}

      {/* ── Share toast ── */}
      {showToast && <ShareToast onClose={() => setShowToast(false)} t={t}/>}

      {/* ── Tweaks ── */}
      <TweaksPanel>
        <TweakSection label="Mood" />
        <TweakRadio options={["Calm","Warm","Bold"]} value={mood} onChange={v => setTweak("mood", v)} />
        <TweakSection label="Checked items" />
        <TweakRadio options={["inline","bottom"]} value={sortChecked} onChange={v => setTweak("sortChecked", v)} />
      </TweaksPanel>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
