// ── Rating card (compact) ─────────────────────────────────
function RatingCard({ recipe, onDismiss, t }) {
  const [voted, setVoted] = React.useState(null);
  const [exiting, setExiting] = React.useState(false);
  const [upPress, setUpPress] = React.useState(false);
  const [dnPress, setDnPress] = React.useState(false);

  const handleVote = (dir) => {
    if (voted) return;
    setVoted(dir);
    setTimeout(() => {setExiting(true);setTimeout(() => onDismiss(), 350);}, 850);
  };

  return (
    <div style={{
      animation: exiting ? "none" : "slideDown 0.25s ease",
      opacity: exiting ? 0 : 1,
      transform: exiting ? "translateY(-6px)" : "translateY(0)",
      transition: exiting ? "all 0.3s ease" : "none",
      marginBottom: 14
    }}>
      <div style={{ background: t.ratingCardBg, border: `1.5px solid ${t.ratingCardBorder}`, borderRadius: 16, boxShadow: shadow.md, overflow: "hidden" }}>
        <div style={{ height: 3, background: t.ratingAccent }} />
        <div style={{ padding: "12px 14px 14px" }}>
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 10 }}>
            <div>
              <span style={{ fontSize: "0.6875rem", fontWeight: 700, color: t.ratingAccent, textTransform: "uppercase", letterSpacing: "0.04em" }}>
                {recipe.emoji} How was it?
              </span>
              <p style={{ fontSize: "0.9375rem", fontWeight: 700, color: t.heading, marginTop: 2, lineHeight: 1.2 }}>
                {recipe.name}
              </p>
              <p style={{ fontSize: "0.75rem", color: t.subtext, marginTop: 2 }}>Cooked {recipe.date}</p>
            </div>
            <button onClick={() => onDismiss()} style={{ fontSize: "0.75rem", color: t.dismissText, padding: 0, background: "none", border: "none", cursor: "pointer", marginTop: 2 }}>
              Not now
            </button>
          </div>

          {!voted ?
          <div style={{ display: "flex", gap: 8 }}>
              <button onPointerDown={() => setUpPress(true)} onPointerUp={() => {setUpPress(false);handleVote("up");}} onPointerLeave={() => setUpPress(false)}
            style={{ flex: 1, height: 48, display: "flex", alignItems: "center", justifyContent: "center", gap: 7, background: t.upBg, border: `1.5px solid ${t.upBorder}`, borderRadius: 10, cursor: "pointer", transform: upPress ? "scale(0.94)" : "scale(1)", transition: "all 0.1s ease", boxShadow: upPress ? "none" : shadow.sm }}>
                <IconThumbUp size={20} color={t.upText} />
                <span style={{ fontSize: "0.875rem", fontWeight: 600, color: t.upText }}>Loved it</span>
              </button>
              <button onPointerDown={() => setDnPress(true)} onPointerUp={() => {setDnPress(false);handleVote("down");}} onPointerLeave={() => setDnPress(false)}
            style={{ flex: 1, height: 48, display: "flex", alignItems: "center", justifyContent: "center", gap: 7, background: t.downBg, border: `1.5px solid ${t.downBorder}`, borderRadius: 10, cursor: "pointer", transform: dnPress ? "scale(0.94)" : "scale(1)", transition: "all 0.1s ease", boxShadow: dnPress ? "none" : shadow.sm }}>
                <IconThumbDown size={20} color={t.downText} />
                <span style={{ fontSize: "0.875rem", fontWeight: 600, color: t.downText }}>Not for us</span>
              </button>
            </div> :

          <div style={{ height: 48, borderRadius: 10, background: voted === "up" ? t.thanksUpBg : t.thanksDownBg, border: `1.5px solid ${voted === "up" ? t.thanksUpBorder : t.thanksDownBorder}`, display: "flex", alignItems: "center", justifyContent: "center", gap: 10, animation: "thanksPop 0.3s ease" }}>
              <span style={{ fontSize: "1.25rem" }}>{voted === "up" ? "🎉" : "👋"}</span>
              <span style={{ fontSize: "0.875rem", fontWeight: 600, color: voted === "up" ? t.thanksUpText : t.thanksDownText }}>
                {voted === "up" ? "Noted — we'll suggest it again!" : "Got it — won't suggest it again."}
              </span>
            </div>
          }
        </div>
      </div>
    </div>);

}

      {/* Hero image placeholder */}
      <div style={{

        background: `linear-gradient(135deg, ${t.heroGradFrom} 0%, ${t.heroGradTo} 100%)`,
        position: "relative", overflow: "hidden", height: "120px"
      }}>
        <FoodDoodle t={t} />
        {/* Overlay gradient for text readability */}
        <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to top, rgba(0,0,0,0.35) 0%, transparent 60%)", height: "2px" }} />
        {/* Title overlay */}
        <div style={{ position: "absolute", bottom: 14, left: 16, right: 16 }}>
          <h2 style={{ fontSize: "1.375rem", fontWeight: 700, color: "#fff", letterSpacing: "-0.025em", lineHeight: 1.2, textShadow: "0 1px 4px rgba(0,0,0,0.3)" }}>
            {recipe.title}
          </h2>
          <p style={{ fontSize: "0.8125rem", color: "rgba(255,255,255,0.85)", marginTop: 3, textShadow: "0 1px 3px rgba(0,0,0,0.3)" }}>
            {recipe.description}
          </p>
        </div>
        {/* Photo credit */}
        <div style={{ position: "absolute", top: 10, right: 10 }}>
          <span style={{ fontSize: "0.625rem", color: "rgba(255,255,255,0.6)", background: "rgba(0,0,0,0.2)", padding: "2px 7px", borderRadius: 9999, backdropFilter: "blur(4px)" }}>
            Photo from {recipe.source}
          </span>
        </div>
        {/* Regenerate */}
        <button onClick={handleRegenerate} style={{
          position: "absolute", top: 10, left: 10,
          width: 32, height: 32, borderRadius: 9,
          background: "rgba(0,0,0,0.25)", backdropFilter: "blur(4px)",
          display: "flex", alignItems: "center", justifyContent: "center",
          border: "none", cursor: "pointer",
          transform: regenerating ? "rotate(360deg)" : "rotate(0)", transition: "transform 0.6s ease"
        }}>
          <IconRefresh color="rgba(255,255,255,0.85)" />
        </button>
      </div>

      {/* Recipe details */}
      <div style={{ padding: "14px 16px 16px" }}>

        {/* Time + tags */}
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
          <span style={{ fontSize: "0.8125rem", fontWeight: 600, color: t.subtext }}>
            ⏱ {recipe.prepTime} prep · {recipe.cookTime} cook
          </span>
          <span style={{ color: t.micro, fontSize: "0.75rem" }}>·</span>
          {recipe.tags.map((tag) =>
          <span key={tag} style={{ fontSize: "0.6875rem", fontWeight: 500, padding: "2px 8px", borderRadius: 9999, background: t.tagBg, color: t.tagText, border: `1px solid ${t.tagBorder}` }}>
              {tag}
            </span>
          )}
        </div>

        {/* Ingredients */}
        <div style={{ marginBottom: 14 }}>
          <p style={{ fontSize: "0.75rem", fontWeight: 700, color: t.subtext, letterSpacing: "0.03em", textTransform: "uppercase", marginBottom: 8 }}>
            What you need
          </p>
          <div style={{ display: "flex", flexWrap: "wrap", gap: "4px 10px" }}>
            {recipe.ingredients.map((ing) =>
            <span key={ing.name} style={{
              fontSize: "0.875rem",
              color: ing.staple ? t.stapleColor : t.heading,
              fontWeight: ing.staple ? 600 : 400
            }}>
                {ing.staple ? "✓ " : ""}{ing.name}
                <span style={{ color: t.micro, fontWeight: 400 }}> {ing.qty}</span>
              </span>
            )}
          </div>
        </div>

        {/* Full recipe link */}
        <a href="#" style={{
          display: "inline-flex", alignItems: "center", gap: 6,
          fontSize: "0.875rem", fontWeight: 600, color: t.linkColor,
          padding: "8px 14px", borderRadius: 9,
          border: `1.5px solid ${t.tagBorder}`,
          background: t.tagBg,
          transition: "all 0.12s ease"
        }}>
          <IconExternalLink color={t.linkColor} />
          Full recipe on Allrecipes
        </a>
      </div>
    </div>);

}

// ── Week at a glance ──────────────────────────────────────
function WeekGlance({ t }) {
  return (
    <div style={{ background: t.weekBg, borderRadius: 14, border: `1px solid ${t.weekBorder}`, boxShadow: shadow.sm, overflow: "hidden", marginBottom: 14 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "11px 16px 10px", borderBottom: `1px solid ${t.weekDivider}` }}>
        <span style={{ fontSize: "0.875rem", fontWeight: 700, color: t.heading }}>This week</span>
        <span style={{ fontSize: "0.75rem", color: t.subtext }}>Apr 28 – May 4</span>
      </div>
      {WEEK.map((d, i) =>
      <div key={i} style={{
        display: "flex", alignItems: "center",
        padding: "10px 16px",
        background: d.today ? t.weekToday : "transparent",
        borderBottom: i < WEEK.length - 1 ? `1px solid ${t.weekDivider}` : "none",
        gap: 12
      }}>
          <span style={{ fontSize: "0.75rem", fontWeight: 700, color: d.today ? t.weekTodayText : t.subtext, width: 26, flexShrink: 0, textTransform: "uppercase", letterSpacing: "0.03em" }}>
            {d.day}
          </span>
          <span style={{
          flex: 1, fontSize: "0.875rem",
          fontWeight: d.today ? 700 : 400,
          color: d.done ? t.subtext : d.skip ? t.micro : d.today ? t.weekTodayText : t.heading,
          textDecoration: d.done ? "line-through" : "none",
          textDecorationColor: t.micro,
          fontStyle: d.skip ? "italic" : "normal"
        }}>
            {d.recipe}
          </span>
          {d.today &&
        <span style={{ fontSize: "0.6875rem", fontWeight: 700, padding: "2px 8px", borderRadius: 9999, background: t.weekTodayText, color: "#fff", flexShrink: 0 }}>
              Tonight
            </span>
        }
          {d.done &&
        <span style={{ fontSize: "0.8rem", color: t.stapleColor, flexShrink: 0 }}>✓</span>
        }
        </div>
      )}
    </div>);

}

// ── Tweak defaults ────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "mood": "Warm",
  "showRating": true
} /*EDITMODE-END*/;

// ── App ───────────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const { mood, showRating } = tweaks;
  const t = THEMES[mood] || THEMES.Warm;

  const [ratingVisible, setRatingVisible] = React.useState(true);

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", background: t.appBg, fontFamily: "'DM Sans', sans-serif" }}>

      {/* Status bar */}
      <div style={{ height: 32, flexShrink: 0, background: t.headerBg, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 20px" }}>
        <span style={{ fontSize: "0.875rem", fontWeight: 600, color: t.heading }}>9:41</span>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <svg width="16" height="12" viewBox="0 0 16 12" fill={C.neutral[500]}><rect x="0" y="6" width="3" height="6" rx="1" /><rect x="4.5" y="4" width="3" height="8" rx="1" /><rect x="9" y="2" width="3" height="10" rx="1" /><rect x="13.5" y="0" width="2.5" height="12" rx="1" /></svg>
          <svg width="22" height="11" viewBox="0 0 22 11" fill="none"><rect x="0.5" y="0.5" width="18" height="10" rx="2.5" stroke={C.neutral[500]} strokeWidth="1" /><rect x="2" y="2" width="14" height="7" rx="1.5" fill={C.neutral[500]} /><path d="M20 3.5v4a2 2 0 0 0 0-4z" fill={C.neutral[500]} /></svg>
        </div>
      </div>

      {/* Header */}
      <div style={{ flexShrink: 0, background: t.headerBg, padding: "6px 20px 8px", borderBottom: `1px solid ${t.headerBorder}`, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <div>
          <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
            <span style={{ fontSize: "1.125rem", fontWeight: 700, letterSpacing: "-0.02em", color: t.heading }}>MealMate</span>
            <span style={{ fontSize: "0.6875rem", fontWeight: 500, background: t.pillBg, color: t.pillText, borderRadius: 9999, padding: "1px 7px" }}>
              Week of Apr 28
            </span>
          </div>
          <p style={{ fontSize: "0.8125rem", color: t.subtext, marginTop: 1 }}>
            Wednesday, Apr 30 · <span style={{ fontWeight: 600, color: t.heading }}>Tonight's dinner</span>
          </p>
        </div>
        <div style={{ width: 30, height: 30, borderRadius: "50%", background: `linear-gradient(135deg, ${C.secondary[200]}, ${C.secondary[400]})`, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <span style={{ fontSize: "0.8125rem", fontWeight: 600, color: C.secondary[800] }}>J</span>
        </div>
      </div>

      {/* Scroll area */}
      <div style={{ flex: 1, minHeight: 0, overflowY: "auto", padding: "14px 14px 24px" }}>

        {/* Rating prompt */}
        {showRating && ratingVisible &&
        <RatingCard recipe={UNRATED} onDismiss={() => setRatingVisible(false)} t={t} />
        }

        {/* Tonight's recipe */}
        <TonightCard recipe={TONIGHT} t={t} />

        {/* Grocery list shortcut */}
        <a href="#" style={{
          display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "13px 16px", borderRadius: 12, marginBottom: 14,
          background: t.groceryBg, border: `1.5px solid ${t.groceryBorder}`,
          boxShadow: shadow.sm
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <IconCart color={t.groceryText} />
            <div>
              <span style={{ fontSize: "0.9375rem", fontWeight: 600, color: t.groceryText, display: "block", lineHeight: 1.2 }}>View Grocery List</span>
              <span style={{ fontSize: "0.75rem", color: t.subtext }}>18 items · 5 in cart</span>
            </div>
          </div>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={t.groceryText} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6" /></svg>
        </a>

        {/* Week glance */}
        <WeekGlance t={t} />

      </div>

      {/* Bottom nav */}
      <nav style={{ flexShrink: 0, background: t.navBg, borderTop: `1px solid ${t.navBorder}`, display: "flex" }}>
        {[
        { id: "home", label: "Home", Icon: IconHome },
        { id: "grocery", label: "Grocery", Icon: IconList },
        { id: "settings", label: "Settings", Icon: IconSettings }].
        map(({ id, label, Icon }) => {
          const active = id === "home";
          const color = active ? t.navActive : t.navInactive;
          return (
            <button key={id} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2, padding: "7px 0 5px", background: "transparent", border: "none", cursor: "pointer" }}>
              <Icon color={color} />
              <span style={{ fontSize: "0.6875rem", fontWeight: active ? 600 : 400, color }}>{label}</span>
              {active && <span style={{ width: 18, height: 2, background: t.navActive, borderRadius: 2 }} />}
            </button>);

        })}
      </nav>

      {/* Tweaks */}
      <TweaksPanel>
        <TweakSection label="Mood" />
        <TweakRadio options={["Calm", "Warm", "Bold"]} value={mood} onChange={(v) => setTweak("mood", v)} />
        <TweakSection label="Rating prompt" />
        <TweakToggle label="Show rating card" value={showRating} onChange={(v) => {setTweak("showRating", v);setRatingVisible(v);}} />
      </TweaksPanel>

    </div>);

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
