// ── Icons ─────────────────────────────────────────────────
function IconHome({ color }) {
  return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z" /><path d="M9 21V12h6v9" /></svg>;
}
function IconList({ color }) {
  return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 6h11M9 12h11M9 18h11" /><circle cx="4.5" cy="6" r="1" fill={color} stroke="none" /><circle cx="4.5" cy="12" r="1" fill={color} stroke="none" /><circle cx="4.5" cy="18" r="1" fill={color} stroke="none" /></svg>;
}

  return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3" /><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" /></svg>;
}
function IconSparkle() {
  return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83" /></svg>;
}
function IconChevronRight({ color }) {
  return <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color || "currentColor"} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6" /></svg>;
}

      <path d="M110 95 Q107 87 110 81 Q113 75 110 69" stroke={t.body} strokeWidth="1.5" fill="none" strokeLinecap="round" opacity="0.4" />

      <rect x="60" y="86" width="2" height="12" rx="1" fill={t.subCardBorder} />

      <circle cx="110" cy="116" r="1.5" fill={s[400]} opacity="0.4" />
      <circle cx="120" cy="113" r="2" fill={s[400]} opacity="0.5" />

}

// ── Hero: Typographic ─────────────────────────────────────
function HeroTypographic({ t }) {
  const days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
  return (
    <div style={{ width: "100%", padding: "8px 0 4px", display: "flex", flexDirection: "column", alignItems: "center", gap: 16 }}>
      {/* Big "7" */}
      <div style={{ position: "relative", display: "flex", alignItems: "baseline", gap: 6 }}>
        <span style={{
          fontSize: "7rem",
          fontWeight: 700,
          letterSpacing: "-0.06em",
          lineHeight: 1,
          color: t.ctaFrom,
          opacity: 0.15,
          userSelect: "none",
          position: "absolute",
          left: -12,
          top: -10
        }}>7</span>
        <span style={{
          fontSize: "2.5rem",
          fontWeight: 700,
          letterSpacing: "-0.04em",
          lineHeight: 1,
          color: t.heading,
          position: "relative",
          zIndex: 1
        }}>dinners</span>
        <span style={{ fontSize: "0.9rem", fontWeight: 400, color: t.body, position: "relative", zIndex: 1, marginBottom: 4 }}>planned</span>
      </div>
      {/* Day pills */}
      <div style={{ display: "flex", gap: 5 }}>
        {days.map((d, i) =>
        <div key={d} style={{
          width: 36,
          height: 36,
          borderRadius: 8,
          background: i === 0 ? t.ctaTo : t.subCardBg,
          border: `1px solid ${i === 0 ? "transparent" : t.subCardBorder}`,
          display: "flex",
          alignItems: "center",
          justifyContent: "center",
          fontSize: "0.6rem",
          fontWeight: i === 0 ? 700 : 500,
          color: i === 0 ? "#fff" : t.body,
          letterSpacing: "0.03em",
          textTransform: "uppercase"
        }}>{d}</div>
        )}
      </div>
    </div>);

}

// ── Hero: Color Wash ──────────────────────────────────────
function HeroColorWash({ t, personality }) {
  const bgColor = personality === "Warm" ? DS.secondary[500] : personality === "Bold" ? DS.primary[800] : DS.primary[600];
  const dotColor = personality === "Warm" ? DS.secondary[300] : DS.primary[400];
  return (
    <div style={{
      width: "calc(100% + 40px)",
      marginLeft: -20,
      background: bgColor,
      padding: "28px 28px 32px",
      position: "relative",
      overflow: "hidden"
    }}>
      {/* Subtle dot pattern */}
      <svg style={{ position: "absolute", inset: 0, width: "100%", height: "100%", opacity: 0.12 }} xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
            <circle cx="2" cy="2" r="1.5" fill={dotColor} />
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#dots)" />
      </svg>
      {/* Large circle accent */}
      <div style={{
        position: "absolute", right: -30, top: -30,
        width: 140, height: 140,
        borderRadius: "50%",
        background: "rgba(255,255,255,0.07)"
      }} />
      <div style={{ position: "relative", zIndex: 1 }}>
        <p style={{ fontSize: "0.8125rem", fontWeight: 500, color: "rgba(255,255,255,0.7)", marginBottom: 6, letterSpacing: "0.04em", textTransform: "uppercase" }}>
          Good morning, Jamie
        </p>
        <h1 style={{
          fontSize: "2rem",
          fontWeight: 700,
          color: "#fff",
          lineHeight: 1.2,
          letterSpacing: "-0.03em",
          textWrap: "balance"
        }}>
          Ready to plan<br />your week?
        </h1>
        <p style={{ marginTop: 10, fontSize: "0.875rem", color: "rgba(255,255,255,0.72)", lineHeight: 1.5 }}>
          Your kitchen is all set.
        </p>
      </div>
    </div>);

}

// ── Shared sub-components ─────────────────────────────────
function ProfileChip({ children, t }) {
  return (
    <span style={{
      display: "inline-flex", alignItems: "center",
      fontSize: "0.75rem", fontWeight: 500,
      color: t.chipText, background: t.chipBg,
      border: `1px solid ${t.chipBorder}`,
      borderRadius: 9999, padding: "3px 10px", lineHeight: 1.4
    }}>
      {children}
    </span>);

}

function HintRow({ icon, text, t }) {
  return (
    <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
      <span style={{ fontSize: "1rem", flexShrink: 0, marginTop: 1 }}>{icon}</span>
      <span style={{ fontSize: "0.8125rem", color: t.body, lineHeight: 1.5 }}>{text}</span>
    </div>);

}

function BottomNav({ t, density }) {
  const tabs = [
  { id: "home", label: "Home", Icon: IconHome },
  { id: "grocery", label: "Grocery", Icon: IconList },
  { id: "settings", label: "Settings", Icon: IconSettingsIcon }];

  return (
    <nav style={{
      position: "sticky", bottom: 0,
      background: t.navBg,
      borderTop: `1px solid ${t.navBorder}`,
      display: "flex", alignItems: "stretch",
      paddingBottom: 6,
      boxShadow: t.shadow.sm,
      zIndex: 100, flexShrink: 0
    }}>
      {tabs.map(({ id, label, Icon }) => {
        const isActive = id === "home";
        const color = isActive ? t.activeNav : t.inactiveNav;
        return (
          <button key={id} style={{
            flex: 1, display: "flex", flexDirection: "column",
            alignItems: "center", gap: 3,
            padding: density === "Cozy" ? "8px 0 4px" : "10px 0 6px",
            background: "transparent", border: "none", cursor: "pointer"
          }}>
            <Icon color={color} />
            <span style={{
              fontSize: "0.6875rem", fontWeight: isActive ? 600 : 400,
              color, letterSpacing: "0.01em"
            }}>{label}</span>
            {isActive && <span style={{ width: 18, height: 2, background: t.navIndicator, borderRadius: 2 }} />}
          </button>);

      })}
    </nav>);

}

// ── Main App ──────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "personality": "Warm",
  "heroStyle": "Color Wash",
  "density": "Airy"
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const { personality, heroStyle, density } = tweaks;

  const t = PERSONALITIES[personality] || PERSONALITIES.Calm;
  const [pressed, setPressed] = React.useState(false);

  // Density tokens
  const gap = density === "Cozy" ? 16 : 24;
  const mainPad = density === "Cozy" ? "14px 16px 90px" : "20px 20px 100px";
  const cardPad = density === "Cozy" ? "13px 16px" : "16px 20px";
  const h1Size = density === "Cozy" ? "1.375rem" : "1.625rem";
  const ctaPad = density === "Cozy" ? "14px 20px" : "17px 24px";

  const statItems = [
  { label: "12 staples", detail: "pantry ready" },
  { label: "3 tools",    detail: "kitchen set" },
  { label: "Preferences",detail: "configured" },
];


  return (
    <div style={{
      display: "flex", flexDirection: "column", minHeight: "100vh",
      background: t.appBg, fontFamily: "'DM Sans', sans-serif",
      color: t.heading, transition: "background 0.3s ease"
    }}>

      {/* Status bar */}
      <div style={{
        height: 44, background: t.statusBg,
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "0 24px", flexShrink: 0,
        transition: "background 0.3s ease"
      }}>
        <span style={{ fontSize: "0.875rem", fontWeight: 600, color: t.heading }}>9:41</span>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <svg width="16" height="12" viewBox="0 0 16 12" fill={t.label}>
            <rect x="0" y="6" width="3" height="6" rx="1" />
            <rect x="4.5" y="4" width="3" height="8" rx="1" />
            <rect x="9" y="2" width="3" height="10" rx="1" />
            <rect x="13.5" y="0" width="2.5" height="12" rx="1" />
          </svg>
          <svg width="22" height="11" viewBox="0 0 22 11" fill="none">
            <rect x="0.5" y="0.5" width="18" height="10" rx="2.5" stroke={t.label} strokeWidth="1" />
            <rect x="2" y="2" width="14" height="7" rx="1.5" fill={t.label} />
            <path d="M20 3.5v4a2 2 0 0 0 0-4z" fill={t.label} />
          </svg>
        </div>
      </div>

      {/* Header */}
      <header style={{
        padding: density === "Cozy" ? "6px 20px 0" : "8px 24px 0",
        display: "flex", alignItems: "center", justifyContent: "space-between",
        flexShrink: 0
      }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
          <span style={{ fontSize: density === "Cozy" ? "1.25rem" : "1.375rem", fontWeight: 700, color: t.wordmarkColor, letterSpacing: "-0.02em" }}>
            MealMate
          </span>
          <span style={{
            fontSize: "0.6875rem", fontWeight: 500,
            background: t.weekBadgeBg, color: t.weekBadgeText,
            borderRadius: 9999, padding: "1px 7px"
          }}>
            Week of Apr 28
          </span>
        </div>
        <div style={{
          width: 32, height: 32, borderRadius: "50%",
          background: `linear-gradient(135deg, ${t.avatarFrom}, ${t.avatarTo})`,
          display: "flex", alignItems: "center", justifyContent: "center"
        }}>
          <span style={{ fontSize: "0.8125rem", fontWeight: 600, color: t.avatarText }}>J</span>
        </div>
      </header>

      {/* Scrollable body */}
      <main style={{
        flex: 1, padding: mainPad,
        display: "flex", flexDirection: "column", gap,
        overflowY: "auto", transition: "padding 0.25s ease"
      }}>

        {/* ── Hero section ── */}
        {heroStyle === "Illustrated" &&
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", textAlign: "center", paddingTop: 4, gap: 6 }}>
            <HeroIllustrated t={t} />
            <div style={{ marginTop: 4 }}>
              <h1 style={{ fontSize: h1Size, fontWeight: 700, color: t.heading, lineHeight: 1.25, letterSpacing: "-0.025em", textWrap: "balance" }}>
                Ready to plan<br />your week?
              </h1>
              <p style={{ marginTop: 8, fontSize: "0.9375rem", color: t.body, lineHeight: 1.55, maxWidth: 270, margin: "8px auto 0" }}>
                Your kitchen is all set. Let's find 7 dinners your family will love.
              </p>
            </div>
          </div>
        }

        {heroStyle === "Typographic" &&
        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", textAlign: "center", gap: 10, paddingTop: 4 }}>
            <HeroTypographic t={t} />
            <p style={{ fontSize: "0.9375rem", color: t.body, lineHeight: 1.55, maxWidth: 270 }}>
              Your kitchen is all set. Let's find 7 dinners your family will love.
            </p>
          </div>
        }

        {heroStyle === "Color Wash" &&
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
            <HeroColorWash t={t} personality={personality} />
          </div>
        }

        {/* ── CTA ── */}
        <div style={{ display: "flex", flexDirection: "column", gap: "16px" }}>
          <button
            onPointerDown={() => setPressed(true)}
            onPointerUp={() => setPressed(false)}
            onPointerLeave={() => setPressed(false)}
            style={{
              width: "100%", padding: ctaPad,
              borderRadius: 14,
              background: pressed ? t.ctaPressed : `linear-gradient(160deg, ${t.ctaFrom} 0%, ${t.ctaTo} 100%)`,
              color: "#fff",
              fontSize: density === "Cozy" ? "0.9375rem" : "1rem",
              fontWeight: 600, border: "none", cursor: "pointer",
              display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
              boxShadow: pressed ? t.shadow.sm : `0 6px 20px ${t.ctaShadow}, ${t.shadow.md}`,
              transform: pressed ? "scale(0.985)" : "scale(1)",
              transition: "all 0.12s ease",
              letterSpacing: "-0.01em"
            }}>
            
            <IconSparkle />
            Generate Your First Meal Plan
          </button>
          <p style={{ fontSize: "0.75rem", color: t.micro, lineHeight: 1.4, textAlign: "left" }}>We'll suggest 2 options for each of 7 nights — you pick your favorites.

          </p>
        </div>

        {/* ── Kitchen profile card ── */}
        <div style={{
          background: t.cardBg, borderRadius: 14,
          boxShadow: t.shadow.md, padding: cardPad,
          display: "flex", flexDirection: "column", gap: density === "Cozy" ? 10 : 12,
          transition: "background 0.3s ease"
        }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span style={{ fontSize: "0.8125rem", fontWeight: 600, color: t.label, letterSpacing: "0.02em", textTransform: "uppercase" }}>
              Your Kitchen Profile
            </span>
            <button style={{
              display: "flex", alignItems: "center", gap: 3,
              background: "transparent", border: "none", cursor: "pointer",
              fontSize: "0.75rem", fontWeight: 500, color: t.accentLabel, padding: 0
            }}>
              Edit <IconChevronRight color={t.accentLabel} />
            </button>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            {statItems.map(({ label, detail }, i) =>
            <div key={i} style={{
              flex: 1, background: t.subCardBg, borderRadius: 10,
              padding: density === "Cozy" ? "8px 8px 6px" : "10px 10px 8px",
              border: `1px solid ${t.subCardBorder}`,
              display: "flex", flexDirection: "column", gap: 2
            }}>
                <span style={{ fontSize: "14px", fontWeight: 700, color: t.statAccent }}>
                  {label}
                </span>
                <span style={{ fontSize: "0.6875rem", color: t.body, fontWeight: 400 }}>
                  {detail}
                </span>
              </div>
            )}
          </div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            <ProfileChip t={t}>Quick &amp; easy</ProfileChip>
            <ProfileChip t={t}>Kid-friendly</ProfileChip>
            <ProfileChip t={t}>High protein</ProfileChip>
            <ProfileChip t={t}>Mild spice</ProfileChip>
          </div>
        </div>

        {/* ── What to expect ── */}
        <div style={{
          background: t.hintCardBg, borderRadius: 14,
          boxShadow: t.shadow.sm, padding: cardPad,
          display: "flex", flexDirection: "column", gap: density === "Cozy" ? 10 : 12,
          transition: "background 0.3s ease"
        }}>
          <span style={{ fontSize: "0.8125rem", fontWeight: 600, color: t.label, letterSpacing: "0.02em", textTransform: "uppercase" }}>
            What to expect
          </span>
          <HintRow t={t} icon="🥦" text="We'll ask if you have anything on hand to use up this week — totally optional." />
          <HintRow t={t} icon="📋" text="Choose one dinner per night from two tailored options." />
          <HintRow t={t} icon="🛒" text="Confirm your plan and get a ready-to-shop grocery list, automatically." />
        </div>

      </main>

      <BottomNav t={t} density={density} />

      {/* ── Tweaks Panel ── */}
      <TweaksPanel>
        <TweakSection label="Personality" />
        <TweakRadio
          label="Mood"
          options={["Calm", "Warm", "Bold"]}
          value={personality}
          onChange={(v) => setTweak("personality", v)} />
        
        <TweakSection label="Hero Style" />
        <TweakRadio
          label="Layout"
          options={["Illustrated", "Typographic", "Color Wash"]}
          value={heroStyle}
          onChange={(v) => setTweak("heroStyle", v)} />
        
        <TweakSection label="Density" />
        <TweakRadio
          label="Spacing"
          options={["Airy", "Cozy"]}
          value={density}
          onChange={(v) => setTweak("density", v)} />
        
      </TweaksPanel>
    </div>);

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
