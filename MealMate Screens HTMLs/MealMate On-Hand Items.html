<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MealMate — What's on hand?</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { margin: 0; background: #d4cdc4; }
    body { display: flex; justify-content: center; font-family: 'DM Sans', sans-serif; }
    #root {
      position: fixed; top: 0; bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 390px;
      display: flex; flex-direction: column; overflow: hidden;
    }
    button, input { font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ── Tokens ────────────────────────────────────────────────
const C = {
  primary:   { 50:"#f4f7f4",100:"#e4ebe4",200:"#c9d8c9",300:"#a3bda3",400:"#7a9e7a",500:"#5a8a5a",600:"#4a7a4a",700:"#3d633d",800:"#334f33",900:"#2a422a" },
  secondary: { 50:"#fdf5f0",100:"#fae8dc",200:"#f4cdb5",300:"#edae88",400:"#e08c5a",500:"#d4723e",600:"#bf5c2e",700:"#9e4a27" },
  neutral:   { 0:"#ffffff",50:"#faf8f6",100:"#f3f0ec",200:"#e8e3dd",300:"#d4cdc4",400:"#b5aca0",500:"#968b7d",600:"#7a6f63",700:"#615851",800:"#4a4340",900:"#352f2d",950:"#1e1b19" },
};
const shadow = {
  sm: "0 1px 3px rgba(53,47,45,0.06), 0 1px 2px rgba(53,47,45,0.04)",
  md: "0 4px 12px rgba(53,47,45,0.08), 0 2px 4px rgba(53,47,45,0.04)",
  lg: "0 8px 24px rgba(53,47,45,0.10), 0 4px 8px rgba(53,47,45,0.05)",
};

// ── Themes ────────────────────────────────────────────────
const THEMES = {
  Calm: {
    appBg: C.neutral[50],
    heroFrom: C.primary[600], heroDot: C.primary[400],
    heroText: "#fff", heroSub: "rgba(255,255,255,0.72)",
    cardBg: C.neutral[0], cardBorder: C.neutral[200],
    heading: C.neutral[900], subtext: C.neutral[500],
    inputBg: C.neutral[0], inputBorder: C.neutral[200], inputText: C.neutral[900],
    tagBg: C.primary[50], tagBorder: C.primary[200], tagText: C.primary[700],
    ctaFrom: C.primary[500], ctaTo: C.primary[600], ctaPressed: C.primary[700],
    ctaShadow: "rgba(74,122,74,0.28)",
    skipText: C.primary[600], skipBorder: C.primary[200], skipBg: "transparent",
    footerBorder: C.neutral[200],
    hintText: C.neutral[400],
    suggestionBg: C.neutral[100], suggestionBorder: C.neutral[200], suggestionText: C.neutral[600],

  Warm: {

    heading: C.neutral[900], subtext: C.neutral[600],
    inputBg: "#fffaf7", inputBorder: C.secondary[200], inputText: C.neutral[900],
    tagBg: C.secondary[50], tagBorder: C.secondary[200], tagText: C.secondary[700],
    ctaFrom: C.secondary[400], ctaTo: C.secondary[600], ctaPressed: C.secondary[700],
    ctaShadow: "rgba(191,92,46,0.28)",
    skipText: C.secondary[600], skipBorder: C.secondary[200], skipBg: "transparent",
    footerBorder: C.secondary[200],
    hintText: C.neutral[400],
    suggestionBg: C.secondary[50], suggestionBorder: C.secondary[200], suggestionText: C.secondary[700],
    statusColor: "rgba(255,255,255,0.7)",
  },
  Bold: {
    appBg: C.neutral[950],
    heroFrom: C.primary[800], heroDot: C.primary[500],
    heroText: "#fff", heroSub: "rgba(255,255,255,0.6)",
    cardBg: "#2a2520", cardBorder: "#4a433d",
    heading: "#f3f0ec", subtext: C.neutral[400],
    inputBg: "#2a2520", inputBorder: "#4a433d", inputText: "#f3f0ec",
    tagBg: "#2e3a2e", tagBorder: C.primary[700], tagText: C.primary[400],
    ctaFrom: C.primary[400], ctaTo: C.primary[600], ctaPressed: C.primary[700],
    ctaShadow: "rgba(90,138,90,0.35)",
    skipText: C.primary[400], skipBorder: "#4a433d", skipBg: "transparent",
    footerBorder: "#4a433d",
    hintText: C.neutral[600],
    suggestionBg: "#332d28", suggestionBorder: "#4a433d", suggestionText: C.neutral[400],
    statusColor: "rgba(255,255,255,0.7)",
  },
};

// Quick suggestions
const SUGGESTIONS = [
  "Chicken thighs","Broccoli","Ground beef","Salmon","Spinach",
  "Bell peppers","Zucchini","Feta","Tofu","Shrimp","Sweet potato",
];

// ── Icons ─────────────────────────────────────────────────
function IconX({ size=12, color }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round">
      <path d="M18 6L6 18M6 6l12 12"/>
    </svg>
  );
}
function IconSparkle({ size=17 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
    </svg>
  );
}
function IconPlus({ color, size=14 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round">
      <path d="M12 5v14M5 12h14"/>
    </svg>
  );
}

// ── Open fridge illustration (sharpie style) ────────────

  const W = small ? 130 : 200;
  const H = small ? 100 : 154;
  const ink = "rgba(255,255,255,0.93)";
  const fill = "rgba(255,255,255,0.14)";
  const fillMid = "rgba(255,255,255,0.09)";
  const sw = small ? 2.2 : 3.0;
  const lc = "round"; const lj = "round";

  return (
    <svg width={W} height={H} viewBox="0 0 200 154" fill="none" xmlns="http://www.w3.org/2000/svg">

      {/* ── Cabinet interior (left) ── */}
      <rect x="8" y="6" width="90" height="142" rx="8" fill={fillMid} stroke={ink} strokeWidth={sw} strokeLinejoin={lj}/>
      {/* Interior back */}
      <rect x="14" y="12" width="78" height="130" rx="4" fill={fill}/>
      {/* Freezer divider */}
      <line x1="14" y1="50" x2="92" y2="50" stroke={ink} strokeWidth={sw-0.5} strokeLinecap={lc}/>

      {/* ── Freezer items ── */}

      <line x1="22" y1="26" x2="40" y2="26" stroke={ink} strokeWidth={sw-1.5} strokeLinecap={lc} opacity="0.45"/>
      <path d="M24 30 Q31 36 38 30" stroke={ink} strokeWidth={sw-1.5} fill="none" strokeLinecap={lc} opacity="0.45"/>

      <line x1="63" y1="22" x2="63" y2="42" stroke={ink} strokeWidth={sw-1.5} strokeLinecap={lc} opacity="0.4"/>
      <line x1="74" y1="22" x2="74" y2="42" stroke={ink} strokeWidth={sw-1.5} strokeLinecap={lc} opacity="0.4"/>

      {/* ── Middle shelf items ── */}
      {/* Milk carton */}
      <rect x="18" y="55" width="22" height="25" rx="3" fill={fill} stroke={ink} strokeWidth={sw-0.8} strokeLinejoin={lj}/>
      <path d="M18 58 L29 52 L40 58" fill={fill} stroke={ink} strokeWidth={sw-0.8} strokeLinejoin={lj}/>
      <line x1="24" y1="64" x2="36" y2="64" stroke={ink} strokeWidth={sw-1.5} strokeLinecap={lc} opacity="0.4"/>
      {/* Tall sauce bottle */}
      <path d="M48 54 Q46 56 46 60 L46 80 Q46 82 48 82 L56 82 Q58 82 58 80 L58 60 Q58 56 56 54 Z"
        fill={fill} stroke={ink} strokeWidth={sw-0.8} strokeLinejoin={lj}/>
      <rect x="48" y="50" width="8" height="5" rx="2" fill={fill} stroke={ink} strokeWidth={sw-1} strokeLinejoin={lj}/>
      {/* Round container with lid */}
      <ellipse cx="75" cy="58" rx="12" ry="4" fill={fill} stroke={ink} strokeWidth={sw-0.8}/>
      <rect x="63" y="58" width="24" height="20" rx="3" fill={fill} stroke={ink} strokeWidth={sw-0.8} strokeLinejoin={lj}/>

      {/* ── Lower shelf — produce ── */}
      {/* Broccoli */}
      <path d="M20 90 C19 85 16 82 19 79 C22 76 25 78 25 81 C27 78 31 78 31 82 C33 79 37 81 35 85 C33 88 29 90 25 90 Z"
        fill={fill} stroke={ink} strokeWidth={sw-0.8} strokeLinejoin={lj}/>
      <line x1="25" y1="90" x2="25" y2="96" stroke={ink} strokeWidth={sw-0.8} strokeLinecap={lc}/>
      {/* 3 eggs */}
      <ellipse cx="50" cy="92" rx="7" ry="9" fill={fill} stroke={ink} strokeWidth={sw-0.9}/>
      <ellipse cx="64" cy="92" rx="7" ry="9" fill={fill} stroke={ink} strokeWidth={sw-0.9}/>
      <ellipse cx="78" cy="92" rx="7" ry="9" fill={fill} stroke={ink} strokeWidth={sw-0.9}/>

      {/* ── Crisper drawer ── */}
      <rect x="14" y="114" width="78" height="22" rx="4" fill={fill} stroke={ink} strokeWidth={sw-0.8} strokeLinejoin={lj}/>
      <line x1="53" y1="114" x2="53" y2="136" stroke={ink} strokeWidth={sw-1.2} strokeLinecap={lc} opacity="0.4"/>
      {/* Drawer handle */}
      <line x1="30" y1="125" x2="46" y2="125" stroke={ink} strokeWidth={sw-0.5} strokeLinecap={lc} opacity="0.6"/>
      <line x1="60" y1="125" x2="76" y2="125" stroke={ink} strokeWidth={sw-0.5} strokeLinecap={lc} opacity="0.6"/>

      {/* ── Door (swung right — same width as cabinet) ── */}
      <rect x="100" y="6" width="90" height="142" rx="8" fill={fillMid} stroke={ink} strokeWidth={sw} strokeLinejoin={lj}/>
      {/* Hinge side line */}
      <line x1="100" y1="6" x2="100" y2="148" stroke={ink} strokeWidth={sw-0.5} strokeLinecap={lc} opacity="0.4"/>

      {/* Door handle */}
      <path d="M100 60 Q94 68 100 80" stroke={ink} strokeWidth={sw+0.5} fill="none" strokeLinecap={lc}/>

      {/* Door shelf lips */}
      <path d="M104 22 Q104 18 108 18 L186 18 Q190 18 190 22 L190 40 Q190 44 186 44 L108 44 Q104 44 104 40 Z"
        fill={fill} stroke={ink} strokeWidth={sw-0.8} strokeLinejoin={lj}/>
      <path d="M104 56 Q104 52 108 52 L186 52 Q190 52 190 56 L190 78 Q190 82 186 82 L108 82 Q104 82 104 78 Z"
        fill={fill} stroke={ink} strokeWidth={sw-0.8} strokeLinejoin={lj}/>
      <path d="M104 92 Q104 88 108 88 L186 88 Q190 88 190 92 L190 120 Q190 124 186 124 L108 124 Q104 124 104 120 Z"
        fill={fill} stroke={ink} strokeWidth={sw-0.8} strokeLinejoin={lj}/>

      {/* Top door shelf: condiments */}
      {/* Ketchup bottle */}
      <path d="M112 38 L112 24 Q112 20 116 20 L120 20 Q124 20 124 24 L124 38"
        fill={fill} stroke={ink} strokeWidth={sw-1} strokeLinejoin={lj}/>

      <path d="M132 38 L132 26 Q132 20 137 20 Q142 20 142 26 L142 38"
        fill={fill} stroke={ink} strokeWidth={sw-1} strokeLinejoin={lj}/>
      {/* Tall OJ carton */}
      <rect x="152" y="20" width="16" height="18" rx="3" fill={fill} stroke={ink} strokeWidth={sw-1} strokeLinejoin={lj}/>
      <path d="M152 24 L160 20 L168 24" fill={fill} stroke={ink} strokeWidth={sw-1} strokeLinejoin={lj}/>

      {/* Middle door shelf: jars */}
      <rect x="110" y="56" width="18" height="22" rx="4" fill={fill} stroke={ink} strokeWidth={sw-1} strokeLinejoin={lj}/>
      <rect x="112" y="52" width="14" height="6" rx="2" fill={fill} stroke={ink} strokeWidth={sw-1.2} strokeLinejoin={lj}/>
      {/* Another jar */}
      <rect x="136" y="58" width="18" height="20" rx="4" fill={fill} stroke={ink} strokeWidth={sw-1} strokeLinejoin={lj}/>
      <rect x="138" y="54" width="14" height="6" rx="2" fill={fill} stroke={ink} strokeWidth={sw-1.2} strokeLinejoin={lj}/>
      {/* Butter box */}
      <rect x="162" y="60" width="22" height="14" rx="3" fill={fill} stroke={ink} strokeWidth={sw-1} strokeLinejoin={lj}/>

      {/* Bottom door shelf: drinks */}
      <rect x="108" y="94" width="20" height="26" rx="4" fill={fill} stroke={ink} strokeWidth={sw-1} strokeLinejoin={lj}/>
      <line x1="108" y1="104" x2="128" y2="104" stroke={ink} strokeWidth={sw-1.5} strokeLinecap={lc} opacity="0.4"/>
      <rect x="134" y="94" width="20" height="26" rx="4" fill={fill} stroke={ink} strokeWidth={sw-1} strokeLinejoin={lj}/>
      <line x1="134" y1="104" x2="154" y2="104" stroke={ink} strokeWidth={sw-1.5} strokeLinecap={lc} opacity="0.4"/>
      <rect x="160" y="96" width="20" height="22" rx="4" fill={fill} stroke={ink} strokeWidth={sw-1} strokeLinejoin={lj}/>

      {/* Bottom base */}
      <rect x="6" y="146" width="188" height="6" rx="3" fill={fill} stroke={ink} strokeWidth={sw-0.8} strokeLinejoin={lj}/>
    </svg>
  );
}

// ── Item tag ──────────────────────────────────────────────
function ItemTag({ label, onRemove, t }) {
  return (
    <span style={{
      display:"inline-flex", alignItems:"center", gap:6,
      padding:"6px 10px 6px 13px",
      background: t.tagBg, color: t.tagText,
      border:`1.5px solid ${t.tagBorder}`,
      borderRadius:9999, fontSize:"0.875rem", fontWeight:500,
      boxShadow: shadow.sm,
      animation: "popIn 0.15s ease",
    }}>
      {label}
      <button
        onClick={onRemove}
        style={{
          display:"flex", alignItems:"center", justifyContent:"center",
          width:18, height:18, borderRadius:"50%",
          background:"rgba(0,0,0,0.08)", border:"none", cursor:"pointer", padding:0,
        }}
      >
        <IconX size={10} color={t.tagText} />
      </button>
    </span>
  );
}

// ── Suggestion pill ───────────────────────────────────────
function SuggestionPill({ label, onAdd, t }) {
  return (
    <button
      onClick={onAdd}
      style={{
        display:"inline-flex", alignItems:"center", gap:4,
        padding:"5px 11px 5px 8px",
        background: t.suggestionBg, color: t.suggestionText,
        border:`1px solid ${t.suggestionBorder}`,
        borderRadius:9999, fontSize:"0.8125rem", fontWeight:400,
        cursor:"pointer", whiteSpace:"nowrap",
        transition:"all 0.1s ease",
      }}
    >
      <IconPlus color={t.suggestionText} size={12}/>
      {label}
    </button>
  );
}

// ── Tweak defaults ────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "mood": "Warm",
  "heroStyle": "Illustrated"
}/*EDITMODE-END*/;

// ── App ───────────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const { mood, heroStyle } = tweaks;
  const t = THEMES[mood] || THEMES.Warm;

  const [items,      setItems]      = React.useState([]);
  const [inputVal,   setInputVal]   = React.useState("");
  const [genPressed, setGenPressed] = React.useState(false);
  const [skipPressed,setSkipPressed]= React.useState(false);
  const inputRef = React.useRef(null);

  const addItem = (raw) => {
    const parts = raw.split(/[,]+/).map(s => s.trim()).filter(Boolean);
    setItems(prev => {
      const existing = new Set(prev.map(x => x.toLowerCase()));
      return [...prev, ...parts.filter(p => !existing.has(p.toLowerCase()))];
    });
    setInputVal("");
  };

  const handleKey = (e) => {
    if ((e.key === "Enter" || e.key === ",") && inputVal.trim()) {
      e.preventDefault(); addItem(inputVal);
    }
    if (e.key === "Backspace" && !inputVal && items.length > 0) {
      setItems(prev => prev.slice(0, -1));
    }
  };

  const removeItem = (idx) => setItems(prev => prev.filter((_, i) => i !== idx));

  // Suggestions not already added
  const visibleSuggestions = SUGGESTIONS.filter(
    s => !items.map(x => x.toLowerCase()).includes(s.toLowerCase())
  ).slice(0, 8);

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background: t.appBg, fontFamily:"'DM Sans', sans-serif" }}>

      {/* ── Scroll area ── */}
      <div style={{ flex:1, minHeight:0, overflowY:"auto", display:"flex", flexDirection:"column" }}>

        {/* Hero section */}
        <div style={{
          background: t.heroFrom,
          padding:"0 24px 18px",
          position:"relative", overflow:"hidden", flexShrink:0,
        }}>
          {/* Dot pattern */}
          <svg style={{ position:"absolute",inset:0,width:"100%",height:"100%",opacity:0.12,pointerEvents:"none" }}>
            <defs><pattern id="on-hand-dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
              <circle cx="2" cy="2" r="1.5" fill={t.heroDot}/>
            </pattern></defs>
            <rect width="100%" height="100%" fill="url(#on-hand-dots)"/>
          </svg>
          {/* Circle accent */}
          <div style={{ position:"absolute",right:-50,top:-50,width:180,height:180,borderRadius:"50%",background:"rgba(255,255,255,0.07)",pointerEvents:"none" }}/>
          <div style={{ position:"absolute",left:-20,bottom:-30,width:120,height:120,borderRadius:"50%",background:"rgba(255,255,255,0.05)",pointerEvents:"none" }}/>

          {/* Status bar */}
          <div style={{
            height:36, display:"flex", alignItems:"center", justifyContent:"space-between",
            position:"relative", zIndex:1,
          }}>
            <span style={{ fontSize:"0.875rem", fontWeight:600, color: t.heroText }}>9:41</span>
            <div style={{ display:"flex", gap:6, alignItems:"center" }}>
              <svg width="16" height="12" viewBox="0 0 16 12" fill="rgba(255,255,255,0.7)">
                <rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/>
                <rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1"/>
              </svg>
              <svg width="22" height="11" viewBox="0 0 22 11" fill="none">
                <rect x="0.5" y="0.5" width="18" height="10" rx="2.5" stroke="rgba(255,255,255,0.7)" strokeWidth="1"/>
                <rect x="2" y="2" width="14" height="7" rx="1.5" fill="rgba(255,255,255,0.7)"/>
                <path d="M20 3.5v4a2 2 0 0 0 0-4z" fill="rgba(255,255,255,0.7)"/>
              </svg>
            </div>
          </div>

          {/* Hero content */}
          <div style={{ position:"relative", zIndex:1, display:"flex", gap:12, alignItems:"center" }}>
            <div style={{ flex:1 }}>
              <p style={{ fontSize:"0.75rem", fontWeight:500, color: t.heroSub, letterSpacing:"0.04em", textTransform:"uppercase", marginBottom:6 }}>
                Before we generate
              </p>
              <h1 style={{
                fontSize:"1.25rem", fontWeight:700, color: t.heroText,
                lineHeight:1.2, letterSpacing:"-0.025em", textWrap:"balance",
              }}>
                Anything on hand<br />to use this week?
              </h1>
              <p style={{ marginTop:6, fontSize:"0.8125rem", color: t.heroSub, lineHeight:1.4 }}>
                We'll build recipes around what you've already got — less waste, shorter grocery list.
              </p>
            </div>
            {heroStyle === "Illustrated" && (
              <div style={{ flexShrink:0, display:"flex", alignItems:"center" }}>
                <FridgeIllustration size="small" />
              </div>
            )}
          </div>
        </div>

        {/* Input card */}
        <div style={{ padding:"20px 20px 0", display:"flex", flexDirection:"column", gap:16 }}>
          <div style={{
            background: t.cardBg,
            border:`1.5px solid ${t.cardBorder}`,
            borderRadius:16, boxShadow: shadow.md,
            padding:"16px",
            display:"flex", flexDirection:"column", gap:12,
          }}>
            {/* Tags + input row */}
            <div
              onClick={() => inputRef.current?.focus()}
              style={{
                display:"flex", flexWrap:"wrap", gap:8, alignItems:"center",
                minHeight:44, cursor:"text",
              }}
            >
              {items.map((item, i) => (
                <ItemTag key={item+i} label={item} onRemove={() => removeItem(i)} t={t} />
              ))}
              <input
                ref={inputRef}
                value={inputVal}
                onChange={e => setInputVal(e.target.value)}
                onKeyDown={handleKey}
                onBlur={() => { if (inputVal.trim()) addItem(inputVal); }}
                placeholder={items.length === 0 ? "e.g. chicken thighs, broccoli, feta…" : "Add more…"}
                style={{
                  flex:"1 1 140px", minWidth:120,
                  border:"none", background:"transparent", outline:"none",
                  fontSize:"0.9375rem", color: t.inputText,
                  lineHeight:1.5,
                }}
              />
            </div>

            {/* Hint */}
            {items.length === 0 && (
              <p style={{ fontSize:"0.75rem", color: t.hintText, lineHeight:1.4 }}>
                Separate with commas or press Enter. These clear after your plan is confirmed.
              </p>
            )}

            {/* Item count */}
            {items.length > 0 && (
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
                <span style={{ fontSize:"0.8125rem", color: t.hintText }}>
                  {items.length} item{items.length !== 1 ? "s" : ""} to use up
                </span>
                <button
                  onClick={() => setItems([])}
                  style={{
                    fontSize:"0.75rem", color: t.hintText, background:"none",
                    border:"none", cursor:"pointer", textDecoration:"underline",
                    textUnderlineOffset:2, opacity:0.7,
                  }}
                >
                  Clear all
                </button>
              </div>
            )}
          </div>

          {/* Quick-add suggestions */}
          {visibleSuggestions.length > 0 && (
            <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
              <span style={{ fontSize:"0.75rem", color: t.hintText, letterSpacing:"0.02em", fontWeight:500, textTransform:"uppercase" }}>
                Quick add
              </span>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                {visibleSuggestions.map(s => (
                  <SuggestionPill key={s} label={s} onAdd={() => {
                    setItems(prev => prev.map(x=>x.toLowerCase()).includes(s.toLowerCase()) ? prev : [...prev, s]);
                  }} t={t} />
                ))}
              </div>
            </div>
          )}

        </div>

        {/* Bottom padding for footer */}
        <div style={{ height:20 }}/>
      </div>{/* end scroll */}

      {/* ── Footer ── */}
      <div style={{
        flexShrink:0,
        background: t.appBg,
        borderTop:`1px solid ${t.cardBorder}`,
        padding:"14px 20px 28px",
        display:"flex", flexDirection:"column", gap:10,
      }}>

        {/* Generate Plan — primary */}
        <button
          onPointerDown={() => setGenPressed(true)}
          onPointerUp={() => setGenPressed(false)}
          onPointerLeave={() => setGenPressed(false)}
          style={{
            width:"100%", height:52, borderRadius:14,
            background: genPressed ? t.ctaPressed : `linear-gradient(160deg, ${t.ctaFrom} 0%, ${t.ctaTo} 100%)`,
            color:"#fff",
            fontSize:"1rem", fontWeight:600,
            border:"none", cursor:"pointer",
            display:"flex", alignItems:"center", justifyContent:"center", gap:8,
            boxShadow: genPressed ? shadow.sm : `0 6px 20px ${t.ctaShadow}, ${shadow.md}`,
            transform: genPressed ? "scale(0.985)" : "scale(1)",
            transition:"all 0.12s ease",
            letterSpacing:"-0.01em",
          }}
        >
          <IconSparkle size={17}/>
          {items.length > 0 ? `Generate Plan — use ${items.length} item${items.length!==1?"s":""}` : "Generate Plan"}
        </button>

        {/* Skip — ghost */}
        <button
          onPointerDown={() => setSkipPressed(true)}
          onPointerUp={() => setSkipPressed(false)}
          onPointerLeave={() => setSkipPressed(false)}
          style={{
            width:"100%", height:44, borderRadius:12,
            background: skipPressed ? t.suggestionBg : "transparent",
            color: t.skipText,
            fontSize:"0.9375rem", fontWeight:500,
            border:`1.5px solid ${skipPressed ? t.skipBorder : "transparent"}`,
            cursor:"pointer",
            transition:"all 0.12s ease",
            letterSpacing:"-0.01em",
          }}
        >
          Skip — nothing to use up
        </button>

      </div>

      {/* ── Tweaks ── */}
      <TweaksPanel>
        <TweakSection label="Mood" />
        <TweakRadio options={["Calm","Warm","Bold"]} value={mood} onChange={v => setTweak("mood", v)} />
        <TweakSection label="Hero" />
        <TweakRadio options={["Illustrated","Minimal"]} value={heroStyle} onChange={v => setTweak("heroStyle", v)} />
      </TweaksPanel>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
