<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MealMate — Add Staples</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { margin: 0; background: #d4cdc4; }
    body {
      display: flex;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
    }
    #root {
      position: fixed;
      top: 0;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 390px;
      background: #faf8f6;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    button { font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; background: none; }
    input  { font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ── Tokens ────────────────────────────────────────────────
const C = {
  primary:   { 50:"#f4f7f4",100:"#e4ebe4",200:"#c9d8c9",300:"#a3bda3",400:"#7a9e7a",500:"#5a8a5a",600:"#4a7a4a",700:"#3d633d",800:"#334f33",900:"#2a422a" },
  secondary: { 50:"#fdf5f0",100:"#fae8dc",200:"#f4cdb5",300:"#edae88",400:"#e08c5a",500:"#d4723e",600:"#bf5c2e",700:"#9e4a27" },
  neutral:   { 0:"#ffffff",50:"#faf8f6",100:"#f3f0ec",200:"#e8e3dd",300:"#d4cdc4",400:"#b5aca0",500:"#968b7d",600:"#7a6f63",700:"#615851",800:"#4a4340",900:"#352f2d" },
};
const shadow = {
  sm: "0 1px 3px rgba(53,47,45,0.06), 0 1px 2px rgba(53,47,45,0.04)",
  md: "0 4px 12px rgba(53,47,45,0.08), 0 2px 4px rgba(53,47,45,0.04)",
  lg: "0 8px 24px rgba(53,47,45,0.10), 0 4px 8px rgba(53,47,45,0.05)",
};

// ── Personality themes ───────────────────────────────────
const THEMES = {
  Calm: {
    appBg:        C.neutral[50],
    headerBg:     C.neutral[50],
    headerShadow: "0 1px 0 rgba(53,47,45,0.06)",
    heading:      C.neutral[900],
    subtext:      C.neutral[500],
    stepLabel:    C.neutral[500],
    cardBg:       C.neutral[0],
    subCardBg:    C.neutral[50],
    subCardBorder:C.neutral[200],
    chipActiveBg: C.primary[600],
    chipActiveBorder: C.primary[600],
    chipBorder:   C.neutral[300],
    chipText:     C.neutral[700],
    progressFill: C.primary[500],
    progressBg:   C.neutral[200],
    ctaFrom:      C.primary[500],
    ctaTo:        C.primary[600],
    ctaPressed:   C.primary[700],
    ctaShadow:    "rgba(74,122,74,0.28)",
    inputBg:      C.neutral[0],
    inputBorder:  C.neutral[200],
    badgeBg:      C.primary[100],
    badgeText:    C.primary[700],
    countBg:      C.primary[500],
    accentText:   C.primary[600],
    catLabel:     C.neutral[800],
    washBg:       null,
    washDot:      null,
  },
  Warm: {
    appBg:        "#fdf5f0",
    headerBg:     "#fdf5f0",
    headerShadow: "0 1px 0 rgba(191,92,46,0.08)",
    heading:      C.neutral[900],
    subtext:      C.neutral[600],
    stepLabel:    C.neutral[500],
    cardBg:       "#fffaf7",
    subCardBg:    "#fdf5f0",
    subCardBorder:C.secondary[200],
    chipActiveBg: C.secondary[600],
    chipActiveBorder: C.secondary[600],
    chipBorder:   C.neutral[300],
    chipText:     C.neutral[700],
    progressFill: C.secondary[500],
    progressBg:   C.neutral[200],
    ctaFrom:      C.secondary[400],
    ctaTo:        C.secondary[600],
    ctaPressed:   C.secondary[700],
    ctaShadow:    "rgba(191,92,46,0.28)",
    inputBg:      "#fffaf7",
    inputBorder:  C.secondary[200],
    badgeBg:      C.secondary[100],
    badgeText:    C.secondary[700],
    countBg:      C.secondary[500],
    accentText:   C.secondary[600],
    catLabel:     C.neutral[800],
    washBg:       C.secondary[500],
    washDot:      C.secondary[300],
  },
  Bold: {
    appBg:        C.neutral[950],
    headerBg:     C.neutral[950],
    headerShadow: "0 1px 0 rgba(0,0,0,0.3)",
    heading:      "#f3f0ec",
    subtext:      C.neutral[400],
    stepLabel:    C.neutral[500],
    cardBg:       "#2a2520",
    subCardBg:    "#332d28",
    subCardBorder:"#4a433d",
    chipActiveBg: C.primary[500],
    chipActiveBorder: C.primary[500],
    chipBorder:   "#5a5248",
    chipText:     C.neutral[300],
    progressFill: C.primary[400],
    progressBg:   "#3a342e",
    ctaFrom:      C.primary[400],
    ctaTo:        C.primary[600],
    ctaPressed:   C.primary[700],
    ctaShadow:    "rgba(90,138,90,0.35)",
    inputBg:      "#2a2520",
    inputBorder:  "#4a433d",
    badgeBg:      "#3d3830",
    badgeText:    C.primary[400],
    countBg:      C.primary[500],
    accentText:   C.primary[400],
    catLabel:     "#e8e3dd",
    washBg:       C.primary[800],
    washDot:      C.primary[400],
  },
};


const CATEGORIES = [
  {
    id: "oils",
    label: "Oils & Vinegars",
    emoji: "🫙",
    items: ["Olive oil","Vegetable oil","Sesame oil","Coconut oil","Balsamic vinegar","Apple cider vinegar","Rice vinegar","Red wine vinegar"],
  },
  {
    id: "spices",
    label: "Spices & Seasonings",
    emoji: "🌿",
    items: ["Salt","Black pepper","Garlic powder","Onion powder","Cumin","Paprika","Oregano","Chili powder","Red pepper flakes","Cinnamon","Turmeric","Cayenne"],
  },
  {
    id: "grains",
    label: "Grains & Pasta",
    emoji: "🌾",
    items: ["White rice","Brown rice","Pasta","Quinoa","Oats","Bread crumbs","Panko","Flour","Cornstarch","Couscous"],
  },
  {
    id: "canned",
    label: "Canned Goods",
    emoji: "🥫",
    items: ["Diced tomatoes","Tomato paste","Coconut milk","Chicken broth","Black beans","Chickpeas","Lentils","Corn","Tuna"],
  },
  {
    id: "condiments",
    label: "Condiments & Sauces",
    emoji: "🍯",
    items: ["Soy sauce","Honey","Dijon mustard","Ketchup","Hot sauce","Worcestershire","Fish sauce","Oyster sauce","Sriracha","Maple syrup","Mayo"],
  },
  {
    id: "freezer",
    label: "Freezer Staples",
    emoji: "❄️",
    items: ["Frozen chicken breasts","Frozen shrimp","Frozen peas","Frozen corn","Frozen edamame","Frozen spinach","Frozen mixed veg"],
  },
  {
    id: "dairy",
    label: "Dairy & Eggs",
    emoji: "🥚",
    items: ["Eggs","Butter","Whole milk","Heavy cream","Parmesan","Shredded mozzarella","Greek yogurt","Cream cheese","Sour cream"],
  },
];

// ── Icons ─────────────────────────────────────────────────
function IconSearch() {
  return (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.neutral[400]} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/>
    </svg>
  );
}
function IconX({ size = 14, color }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color || C.neutral[400]} strokeWidth="2.5" strokeLinecap="round">
      <path d="M18 6L6 18M6 6l12 12"/>
    </svg>
  );
}
function IconPlus({ color }) {
  return (
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color || C.neutral[500]} strokeWidth="2.5" strokeLinecap="round">
      <path d="M12 5v14M5 12h14"/>
    </svg>
  );
}
function IconChevronDown({ open }) {
  return (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={C.neutral[400]} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
      style={{ transform: open ? "rotate(180deg)" : "rotate(0deg)", transition: "transform 0.2s ease" }}>
      <path d="M6 9l6 6 6-6"/>
    </svg>
  );
}
function IconCheck() {
  return (
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
      <path d="M20 6L9 17l-5-5"/>
    </svg>
  );
}

// ── Progress indicator ────────────────────────────────────
function ProgressSteps({ step, total, fillColor, trackColor }) {
  const fill  = fillColor  || C.primary[500];
  const track = trackColor || C.neutral[200];
  return (
    <div style={{ display:"flex", gap:6, alignItems:"center" }}>
      {Array.from({ length: total }, (_, i) => (
        <div key={i} style={{
          height: 4,
          flex: 1,
          borderRadius: 9999,
          background: i < step ? fill : track,
          transition: "all 0.3s ease",
        }} />
      ))}
    </div>
  );
}

// ── Selectable chip ───────────────────────────────────────
function Chip({ label, selected, onToggle }) {
  const [pressed, setPressed] = React.useState(false);
  return (
    <button
      onPointerDown={() => setPressed(true)}
      onPointerUp={() => { setPressed(false); onToggle(); }}
      onPointerLeave={() => setPressed(false)}
      style={{
        display: "inline-flex", alignItems: "center", gap: 5,
        padding: selected ? "6px 12px 6px 8px" : "6px 12px",
        borderRadius: 9999,
        background: selected ? C.primary[600] : C.neutral[0],
        color: selected ? "#fff" : C.neutral[700],
        border: `1.5px solid ${selected ? C.primary[600] : C.neutral[300]}`,
        fontSize: "0.8125rem",
        fontWeight: selected ? 600 : 400,
        cursor: "pointer",
        boxShadow: selected ? shadow.sm : "none",
        transform: pressed ? "scale(0.95)" : "scale(1)",
        transition: "all 0.12s ease",
        whiteSpace: "nowrap",
      }}
    >
      {selected && <IconCheck />}
      {label}
    </button>
  );
}

// ── Category section ──────────────────────────────────────
function CategorySection({ category, selected, onToggle, defaultOpen }) {
  const [open, setOpen] = React.useState(defaultOpen);
  const selectedCount = category.items.filter(item => selected.has(item)).length;

  return (
    <div style={{
      background: C.neutral[0],
      borderRadius: 14,
      boxShadow: shadow.sm,
      overflow: "hidden",
    }}>
      {/* Header */}
      <button
        onClick={() => setOpen(o => !o)}
        style={{
          width: "100%", display: "flex", alignItems: "center",
          justifyContent: "space-between",
          padding: "14px 16px",
          background: "transparent", border: "none", cursor: "pointer",
          gap: 8,
        }}
      >
        <div style={{ display:"flex", alignItems:"center", gap: 10 }}>
          <span style={{ fontSize: "1.1rem", lineHeight: 1 }}>{category.emoji}</span>
          <span style={{ fontSize:"0.9375rem", fontWeight:600, color: C.neutral[800] }}>
            {category.label}
          </span>
          {selectedCount > 0 && (
            <span style={{
              fontSize:"0.6875rem", fontWeight:700,
              background: C.primary[100], color: C.primary[700],
              borderRadius: 9999, padding:"1px 7px",
              lineHeight: 1.6,
            }}>
              {selectedCount}
            </span>
          )}
        </div>
        <IconChevronDown open={open} />
      </button>

      {/* Chips */}
      {open && (
        <div style={{
          padding: "0 16px 16px",
          display: "flex", flexWrap: "wrap", gap: 8,
        }}>
          {category.items.map(item => (
            <Chip
              key={item}
              label={item}
              selected={selected.has(item)}
              onToggle={() => onToggle(item)}
            />
          ))}
        </div>
      )}
    </div>
  );
}

// ── Search result chip ────────────────────────────────────
function SearchResultRow({ item, selected, onToggle }) {
  return (
    <button
      onClick={onToggle}
      style={{
        width:"100%", display:"flex", alignItems:"center", justifyContent:"space-between",
        padding:"11px 0", borderBottom:`1px solid ${C.neutral[100]}`,
        background:"transparent", cursor:"pointer",
      }}
    >
      <span style={{ fontSize:"0.9375rem", color: C.neutral[800] }}>{item}</span>
      <div style={{
        width:22, height:22, borderRadius:6,
        background: selected ? C.primary[500] : "transparent",
        border: `2px solid ${selected ? C.primary[500] : C.neutral[300]}`,
        display:"flex", alignItems:"center", justifyContent:"center",
        flexShrink: 0,
        transition: "all 0.15s ease",
      }}>
        {selected && <IconCheck />}
      </div>
    </button>
  );
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "mood": "Warm",
  "headerStyle": "Color Wash"
}/*EDITMODE-END*/;

// ── Main App ──────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const { mood, headerStyle } = tweaks;
  const t = THEMES[mood] || THEMES.Calm;
  const isWash = headerStyle === "Color Wash" && t.washBg;
  const washText = "rgba(255,255,255,0.85)";
  const washSub  = "rgba(255,255,255,0.65)";
  const [selected, setSelected] = React.useState(new Set());
  const [query, setQuery] = React.useState("");
  const [customItems, setCustomItems] = React.useState([]);
  const [nextPressed, setNextPressed] = React.useState(false);
  const inputRef = React.useRef(null);

  const toggleItem = (item) => {
    setSelected(prev => {
      const next = new Set(prev);
      next.has(item) ? next.delete(item) : next.add(item);
      return next;
    });
  };

  // All known items for search filtering
  const allKnownItems = CATEGORIES.flatMap(c => c.items);

  // Search results: matching known + custom items
  const trimmedQuery = query.trim();
  const searchResults = trimmedQuery.length > 0
    ? allKnownItems.filter(item =>
        item.toLowerCase().includes(trimmedQuery.toLowerCase())
      )
    : [];

  const canAddCustom = trimmedQuery.length > 1 &&
    !allKnownItems.some(i => i.toLowerCase() === trimmedQuery.toLowerCase()) &&
    !customItems.some(i => i.toLowerCase() === trimmedQuery.toLowerCase());

  const handleAddCustom = () => {
    const item = trimmedQuery;
    setCustomItems(prev => [...prev, item]);
    setSelected(prev => new Set([...prev, item]));
    setQuery("");
  };

  const handleKeyDown = (e) => {
    if (e.key === "Enter" && canAddCustom) handleAddCustom();
    if (e.key === "Escape") setQuery("");
  };

  const totalSelected = selected.size;
  const isSearching = trimmedQuery.length > 0;

  return (
    <div style={{
      display:"flex", flexDirection:"column",
      height:"100%",
      background: t.appBg,
      fontFamily:"'DM Sans', sans-serif",
    }}>

      {/* ── Single scroll area: status + header + categories ── */}
      <div style={{ flex:1, minHeight:0, overflowY:"auto", display:"flex", flexDirection:"column", background: t.appBg }}>

      {/* Status bar */}
      <div style={{
        height:44, background: isWash ? t.washBg : t.headerBg, flexShrink:0,
        display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 24px",
      }}>
        <span style={{ fontSize:"0.875rem", fontWeight:600, color: isWash ? washText : t.heading }}>9:41</span>
        <div style={{ display:"flex", gap:6, alignItems:"center" }}>
          <svg width="16" height="12" viewBox="0 0 16 12" fill={C.neutral[600]}>
            <rect x="0" y="6" width="3" height="6" rx="1"/>
            <rect x="4.5" y="4" width="3" height="8" rx="1"/>
            <rect x="9" y="2" width="3" height="10" rx="1"/>
            <rect x="13.5" y="0" width="2.5" height="12" rx="1"/>
          </svg>
          <svg width="22" height="11" viewBox="0 0 22 11" fill="none">
            <rect x="0.5" y="0.5" width="18" height="10" rx="2.5" stroke={C.neutral[600]} strokeWidth="1"/>
            <rect x="2" y="2" width="14" height="7" rx="1.5" fill={C.neutral[600]}/>
            <path d="M20 3.5v4a2 2 0 0 0 0-4z" fill={C.neutral[600]}/>
          </svg>
        </div>
      </div>

      {/* ── Header: progress + title + search ── */}
      <div style={{
        flexShrink: 0,
        background: isWash ? t.washBg : t.headerBg,
        paddingBottom: 12,
        boxShadow: isWash ? "none" : t.headerShadow,
        position: "relative", overflow: "hidden",
      }}>
        {isWash && (
          <svg style={{ position:"absolute",inset:0,width:"100%",height:"100%",opacity:0.12,pointerEvents:"none" }}>
            <defs><pattern id="hdr-dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse"><circle cx="2" cy="2" r="1.5" fill={t.washDot}/></pattern></defs>
            <rect width="100%" height="100%" fill="url(#hdr-dots)"/>
          </svg>
        )}
        {isWash && <div style={{ position:"absolute",right:-40,top:-40,width:160,height:160,borderRadius:"50%",background:"rgba(255,255,255,0.07)",pointerEvents:"none" }}/>}
        {/* Step label + progress */}
        <div style={{ padding:"8px 20px 14px" }}>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
            <span style={{ fontSize:"0.75rem", fontWeight:600, color: isWash ? washSub : t.stepLabel, letterSpacing:"0.04em", textTransform:"uppercase" }}>
              Step 1 of 3
            </span>
            <button style={{ fontSize:"0.8125rem", color: isWash ? washSub : C.neutral[400], fontWeight:500 }}>
              Skip
            </button>
          </div>
          <ProgressSteps step={1} total={3} fillColor={isWash ? "rgba(255,255,255,0.9)" : t.progressFill} trackColor={isWash ? "rgba(255,255,255,0.25)" : t.progressBg} />
          <h1 style={{
            marginTop:14,
            fontSize:"1.5rem", fontWeight:700, color: isWash ? "#fff" : t.heading,
            letterSpacing:"-0.025em", lineHeight:1.2,
          }}>
            What's always in<br />your kitchen?
          </h1>
          <p style={{ marginTop:6, fontSize:"0.875rem", color: isWash ? washSub : t.subtext, lineHeight:1.5 }}>
            Pick your pantry staples — we'll skip these from your grocery list.
          </p>
        </div>

        {/* Search input */}
        <div style={{ padding:"0 20px" }}>
          <div style={{
            display:"flex", alignItems:"center", gap:10,
            background: t.inputBg,
            border:`1.5px solid ${t.inputBorder}`,
            borderRadius:12, padding:"10px 14px",
            boxShadow: shadow.sm,
          }}>
            <IconSearch />
            <input
              ref={inputRef}
              value={query}
              onChange={e => setQuery(e.target.value)}
              onKeyDown={handleKeyDown}
              placeholder="Search or add your own…"
              style={{
                flex:1, border:"none", background:"transparent", outline:"none",
                fontSize:"0.9375rem", color: t.heading,
              }}
            />
            {query.length > 0 && (
              <button onClick={() => setQuery("")} style={{ padding:2, display:"flex" }}>
                <IconX size={14} color={C.neutral[400]} />
              </button>
            )}
          </div>
        </div>
      </div>

      {/* ── Categories ── */}
      <div style={{ padding:"12px 20px 24px", display:"flex", flexDirection:"column", gap:10 }}>

        {/* Search results */}
        {isSearching ? (
          <div style={{ background: C.neutral[0], borderRadius:14, boxShadow: shadow.sm, padding:"0 16px" }}>
            {searchResults.length > 0
              ? searchResults.map(item => (
                  <SearchResultRow key={item} item={item} selected={selected.has(item)} onToggle={() => toggleItem(item)} />
                ))
              : (
                <div style={{ padding:"16px 0", display:"flex", flexDirection:"column", gap:4 }}>
                  <span style={{ fontSize:"0.875rem", color: C.neutral[500] }}>
                    No matches for "<strong style={{ color: C.neutral[800] }}>{trimmedQuery}</strong>"
                  </span>
                </div>
              )
            }
            {canAddCustom && (
              <button
                onClick={handleAddCustom}
                style={{
                  width:"100%", display:"flex", alignItems:"center", gap:8,
                  padding:"12px 0 14px",
                  borderTop:`1px solid ${C.neutral[100]}`,
                  background:"transparent", cursor:"pointer",
                  fontSize:"0.9375rem", fontWeight:500, color: C.primary[600],
                }}
              >
                <div style={{
                  width:22, height:22, borderRadius:6,
                  border:`2px dashed ${C.primary[400]}`,
                  display:"flex", alignItems:"center", justifyContent:"center",
                }}>
                  <IconPlus color={C.primary[500]} />
                </div>
                Add "{trimmedQuery}"
              </button>
            )}
          </div>
        ) : (
          <>
            {/* Custom items section (if any) */}
            {customItems.length > 0 && (
              <div style={{ background: C.neutral[0], borderRadius:14, boxShadow: shadow.sm, padding:"14px 16px" }}>
                <span style={{ fontSize:"0.8125rem", fontWeight:600, color: C.neutral[600], letterSpacing:"0.02em", textTransform:"uppercase", display:"block", marginBottom:10 }}>
                  Your custom items
                </span>
                <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                  {customItems.map(item => (
                    <div key={item} style={{
                      display:"inline-flex", alignItems:"center", gap:6,
                      padding:"5px 10px 5px 12px",
                      borderRadius:9999,
                      background: selected.has(item) ? C.primary[600] : C.neutral[100],
                      color: selected.has(item) ? "#fff" : C.neutral[700],
                      fontSize:"0.8125rem", fontWeight:500,
                      border:`1.5px solid ${selected.has(item) ? C.primary[600] : C.neutral[200]}`,
                    }}>
                      {item}
                      <button
                        onClick={() => {
                          setCustomItems(prev => prev.filter(i => i !== item));
                          setSelected(prev => { const n = new Set(prev); n.delete(item); return n; });
                        }}
                        style={{ display:"flex", padding:0, opacity:0.7 }}
                      >
                        <IconX size={12} color={selected.has(item) ? "rgba(255,255,255,0.8)" : C.neutral[500]} />
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Category sections */}
            {CATEGORIES.map((cat, i) => (
              <CategorySection
                key={cat.id}
                category={cat}
                selected={selected}
                onToggle={toggleItem}
                defaultOpen={i === 0}
              />
            ))}
          </>
        )}
      </div>{/* end categories */}
      </div>{/* end scroll area */}
      <div style={{
        flexShrink: 0,
        background: t.appBg,
        borderTop: `1px solid ${t.subCardBorder}`,
        padding:"16px 20px 28px",
      }}>

        {/* Selected summary pill */}
        {totalSelected > 0 && (
          <div style={{
            display:"flex", alignItems:"center", justifyContent:"center",
            marginBottom:12,
          }}>
            <div style={{
              display:"inline-flex", alignItems:"center", gap:8,
              background: C.neutral[0], borderRadius:9999,
              padding:"7px 16px",
              boxShadow: shadow.md,
              border:`1px solid ${C.neutral[200]}`,
              fontSize:"0.8125rem", color: C.neutral[700],
            }}>
              <span style={{
                display:"inline-flex", alignItems:"center", justifyContent:"center",
                width:20, height:20, borderRadius:"50%",
                background: C.primary[500], color:"#fff",
                fontSize:"0.6875rem", fontWeight:700,
              }}>{totalSelected}</span>
              staple{totalSelected !== 1 ? "s" : ""} selected
              <button onClick={() => setSelected(new Set())} style={{ display:"flex", opacity:0.5 }}>
                <IconX size={12} color={C.neutral[600]} />
              </button>
            </div>
          </div>
        )}

        {/* Next button */}
        <button
          onPointerDown={() => setNextPressed(true)}
          onPointerUp={() => setNextPressed(false)}
          onPointerLeave={() => setNextPressed(false)}
          style={{
            width:"100%", padding:"17px",
            borderRadius:14,
            background: nextPressed ? t.ctaPressed : `linear-gradient(160deg, ${t.ctaFrom} 0%, ${t.ctaTo} 100%)`,
            color:"#fff",
            fontSize:"1rem", fontWeight:600,
            display:"flex", alignItems:"center", justifyContent:"center", gap:8,
            boxShadow: nextPressed ? shadow.sm : `0 6px 20px ${t.ctaShadow}, ${shadow.md}`,
            transform: nextPressed ? "scale(0.985)" : "scale(1)",
            transition:"all 0.12s ease",
            letterSpacing:"-0.01em",
          }}
        >
          {totalSelected === 0 ? "Skip for now" : `Continue with ${totalSelected} staple${totalSelected !== 1 ? "s" : ""}`}
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <path d="M5 12h14M13 6l6 6-6 6"/>
          </svg>
        </button>
      </div>

      <TweaksPanel>
        <TweakSection label="Mood" />
        <TweakRadio options={["Calm","Warm","Bold"]} value={mood} onChange={v => setTweak("mood", v)} />
        <TweakSection label="Header Style" />
        <TweakRadio options={["Standard","Color Wash"]} value={headerStyle} onChange={v => setTweak("headerStyle", v)} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
