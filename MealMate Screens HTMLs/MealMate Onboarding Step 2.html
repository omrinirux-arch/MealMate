<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MealMate — Kitchen Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { margin: 0; background: #d4cdc4; }
    body { display: flex; justify-content: center; font-family: 'DM Sans', sans-serif; }
    #root {
      position: fixed; top: 0; bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 390px;
      background: #faf8f6;
      display: flex; flex-direction: column; overflow: hidden;
    }
    button, input { font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ── Tokens ────────────────────────────────────────────────
const C = {
  primary:   { 50:"#f4f7f4",100:"#e4ebe4",200:"#c9d8c9",300:"#a3bda3",400:"#7a9e7a",500:"#5a8a5a",600:"#4a7a4a",700:"#3d633d",800:"#334f33",900:"#2a422a" },
  secondary: { 50:"#fdf5f0",100:"#fae8dc",200:"#f4cdb5",300:"#edae88",400:"#e08c5a",500:"#d4723e",600:"#bf5c2e",700:"#9e4a27" },
  neutral:   { 0:"#ffffff",50:"#faf8f6",100:"#f3f0ec",200:"#e8e3dd",300:"#d4cdc4",400:"#b5aca0",500:"#968b7d",600:"#7a6f63",700:"#615851",800:"#4a4340",900:"#352f2d",950:"#1e1b19" },
};
const shadow = {
  sm: "0 1px 3px rgba(53,47,45,0.06), 0 1px 2px rgba(53,47,45,0.04)",
  md: "0 4px 12px rgba(53,47,45,0.08), 0 2px 4px rgba(53,47,45,0.04)",
};

// ── Themes ────────────────────────────────────────────────
const THEMES = {
  Calm: {
    appBg: C.neutral[50], headerBg: C.neutral[50],
    heading: C.neutral[900], subtext: C.neutral[500], stepLabel: C.neutral[500],
    cardBg: C.neutral[0], cardBorder: C.neutral[200],
    cardActiveBg: C.primary[50], cardActiveBorder: C.primary[500], cardActiveText: C.primary[700],
    checkBg: C.primary[500], checkBorder: C.neutral[300],
    ctaFrom: C.primary[500], ctaTo: C.primary[600], ctaPressed: C.primary[700],
    ctaShadow: "rgba(74,122,74,0.28)",
    backBg: C.neutral[0], backBorder: C.neutral[300], backText: C.neutral[700],
    progressFill: C.primary[500], progressBg: C.neutral[200],
    inputBg: C.neutral[0], inputBorder: C.neutral[200], inputText: C.neutral[900],
    assumedBg: C.primary[50], assumedBorder: C.primary[200], assumedText: C.primary[700],
    noteBg: C.neutral[100], noteBorder: C.neutral[200], noteText: C.neutral[600],
    washBg: null, washDot: null,
    headerShadow: "0 1px 0 rgba(53,47,45,0.06)",
    catLabel: C.neutral[700],
  },
  Warm: {
    appBg: "#fdf5f0", headerBg: "#fdf5f0",
    heading: C.neutral[900], subtext: C.neutral[600], stepLabel: C.neutral[500],
    cardBg: "#fffaf7", cardBorder: C.secondary[200],
    cardActiveBg: C.secondary[50], cardActiveBorder: C.secondary[500], cardActiveText: C.secondary[700],
    checkBg: C.secondary[500], checkBorder: C.neutral[300],
    ctaFrom: C.secondary[400], ctaTo: C.secondary[600], ctaPressed: C.secondary[700],
    ctaShadow: "rgba(191,92,46,0.28)",
    backBg: "#fffaf7", backBorder: C.secondary[200], backText: C.neutral[700],
    progressFill: C.secondary[500], progressBg: C.neutral[200],
    inputBg: "#fffaf7", inputBorder: C.secondary[200], inputText: C.neutral[900],
    assumedBg: C.secondary[50], assumedBorder: C.secondary[200], assumedText: C.secondary[700],
    noteBg: C.secondary[50], noteBorder: C.secondary[200], noteText: C.secondary[700],
    washBg: C.secondary[500], washDot: C.secondary[300],
    headerShadow: "0 1px 0 rgba(191,92,46,0.08)",
    catLabel: C.neutral[700],
  },
  Bold: {
    appBg: C.neutral[950], headerBg: C.neutral[950],
    heading: "#f3f0ec", subtext: C.neutral[400], stepLabel: C.neutral[500],
    cardBg: "#2a2520", cardBorder: "#4a433d",
    cardActiveBg: "#2e3a2e", cardActiveBorder: C.primary[500], cardActiveText: C.primary[400],
    checkBg: C.primary[500], checkBorder: "#5a5248",
    ctaFrom: C.primary[400], ctaTo: C.primary[600], ctaPressed: C.primary[700],
    ctaShadow: "rgba(90,138,90,0.35)",
    backBg: "#2a2520", backBorder: "#4a433d", backText: C.neutral[300],
    progressFill: C.primary[400], progressBg: "#3a342e",
    inputBg: "#2a2520", inputBorder: "#4a433d", inputText: "#f3f0ec",
    assumedBg: "#2e3a2e", assumedBorder: C.primary[700], assumedText: C.primary[400],
    noteBg: "#2a2520", noteBorder: "#4a433d", noteText: C.neutral[400],
    washBg: C.primary[800], washDot: C.primary[400],
    headerShadow: "0 1px 0 rgba(0,0,0,0.3)",
    catLabel: C.neutral[400],
  },
};

// ── Tool data ─────────────────────────────────────────────
const TOOLS = [
  { id:"instant-pot",    label:"Instant Pot",     emoji:"⚡" },
  { id:"air-fryer",      label:"Air Fryer",        emoji:"💨" },
  { id:"slow-cooker",    label:"Slow Cooker",      emoji:"🍲" },
  { id:"grill",          label:"Grill",            emoji:"🔥" },
  { id:"wok",            label:"Wok",              emoji:"🥘" },
  { id:"dutch-oven",     label:"Dutch Oven",       emoji:"🫕" },
  { id:"food-processor", label:"Food Processor",   emoji:"⚙️" },
  { id:"stand-mixer",    label:"Stand Mixer",      emoji:"🍰" },
  { id:"sous-vide",      label:"Sous Vide",        emoji:"🌡️" },
  { id:"smoker",         label:"Smoker",           emoji:"💨" },
  { id:"sheet-pans",     label:"Sheet Pans",       emoji:"🍪" },
];

const ASSUMED = ["Stovetop", "Oven", "Microwave", "Pots & pans", "Knives"];

// ── Icons ─────────────────────────────────────────────────
function IconCheck({ size = 13, color = "white" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round">
      <path d="M20 6L9 17l-5-5"/>
    </svg>
  );
}
function IconChevronLeft({ color }) {
  return (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={color || C.neutral[700]} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
  );
}
function IconArrowRight({ color }) {
  return (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={color || "white"} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M5 12h14M13 6l6 6-6 6"/>
    </svg>
  );
}
function IconPlus({ color }) {
  return (
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round">
      <path d="M12 5v14M5 12h14"/>
    </svg>
  );
}
function IconX({ size = 14, color }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round">
      <path d="M18 6L6 18M6 6l12 12"/>
    </svg>
  );
}

// ── Progress bar ──────────────────────────────────────────
function ProgressSteps({ step, total, fillColor, trackColor }) {
  return (
    <div style={{ display:"flex", gap:6, alignItems:"center" }}>
      {Array.from({ length: total }, (_, i) => (
        <div key={i} style={{
          height: 4, flex: 1, borderRadius: 9999,
          background: i < step ? (fillColor || C.primary[500]) : (trackColor || C.neutral[200]),
          transition: "all 0.3s ease",
        }}/>
      ))}
    </div>
  );
}

// ── Tool card ─────────────────────────────────────────────
function ToolCard({ tool, selected, onToggle, t }) {
  const [pressed, setPressed] = React.useState(false);
  return (
    <button
      onPointerDown={() => setPressed(true)}
      onPointerUp={() => { setPressed(false); onToggle(); }}
      onPointerLeave={() => setPressed(false)}
      style={{
        display: "flex", alignItems: "center", gap: 12,
        padding: "13px 14px",
        background: selected ? t.cardActiveBg : t.cardBg,
        border: `1.5px solid ${selected ? t.cardActiveBorder : t.cardBorder}`,
        borderRadius: 12,
        cursor: "pointer",
        transform: pressed ? "scale(0.97)" : "scale(1)",
        transition: "all 0.12s ease",
        boxShadow: selected ? shadow.md : shadow.sm,
        textAlign: "left",
        width: "100%",
      }}
    >
      {/* Emoji */}
      <span style={{ fontSize: "1.375rem", lineHeight: 1, flexShrink: 0 }}>{tool.emoji}</span>

      {/* Label */}
      <span style={{
        flex: 1,
        fontSize: "0.9rem",
        fontWeight: selected ? 600 : 400,
        color: selected ? t.cardActiveText : t.heading,
        lineHeight: 1.3,
      }}>
        {tool.label}
      </span>

      {/* Checkbox */}
      <div style={{
        width: 22, height: 22, borderRadius: 6, flexShrink: 0,
        background: selected ? t.checkBg : "transparent",
        border: `2px solid ${selected ? t.checkBg : t.checkBorder}`,
        display: "flex", alignItems: "center", justifyContent: "center",
        transition: "all 0.15s ease",
      }}>
        {selected && <IconCheck />}
      </div>
    </button>
  );
}

// ── Tweaks defaults ───────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "mood": "Warm",
  "headerStyle": "Color Wash"
}/*EDITMODE-END*/;

// ── Main App ──────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const { mood, headerStyle } = tweaks;
  const t = THEMES[mood] || THEMES.Calm;
  const isWash = headerStyle === "Color Wash" && t.washBg;
  const washText = "rgba(255,255,255,0.9)";
  const washSub  = "rgba(255,255,255,0.65)";

  const [selected, setSelected] = React.useState(new Set());
  const [customTools, setCustomTools] = React.useState([]);
  const [inputVal, setInputVal] = React.useState("");
  const [backPressed,  setBackPressed]  = React.useState(false);
  const [nextPressed,  setNextPressed]  = React.useState(false);
  const inputRef = React.useRef(null);

  const toggle = (id) => {
    setSelected(prev => {
      const n = new Set(prev);
      n.has(id) ? n.delete(id) : n.add(id);
      return n;
    });
  };

  const addCustom = () => {
    const val = inputVal.trim();
    if (!val) return;
    const id = "custom-" + val.toLowerCase().replace(/\s+/g, "-");
    setCustomTools(prev => [...prev, { id, label: val }]);
    setSelected(prev => new Set([...prev, id]));
    setInputVal("");
  };

  const removeCustom = (id) => {
    setCustomTools(prev => prev.filter(t => t.id !== id));
    setSelected(prev => { const n = new Set(prev); n.delete(id); return n; });
  };

  const totalSelected = selected.size;

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background: t.appBg, fontFamily:"'DM Sans', sans-serif" }}>

      {/* ── Single scroll area ── */}
      <div style={{ flex:1, minHeight:0, overflowY:"auto", display:"flex", flexDirection:"column" }}>

        {/* Status bar */}
        <div style={{
          height:44, flexShrink:0,
          background: isWash ? t.washBg : t.headerBg,
          display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 24px",
        }}>
          <span style={{ fontSize:"0.875rem", fontWeight:600, color: isWash ? washText : t.heading }}>9:41</span>
          <div style={{ display:"flex", gap:6, alignItems:"center" }}>
            <svg width="16" height="12" viewBox="0 0 16 12" fill={isWash ? "rgba(255,255,255,0.7)" : C.neutral[600]}>
              <rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/>
              <rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1"/>
            </svg>
            <svg width="22" height="11" viewBox="0 0 22 11" fill="none">
              <rect x="0.5" y="0.5" width="18" height="10" rx="2.5" stroke={isWash ? "rgba(255,255,255,0.7)" : C.neutral[600]} strokeWidth="1"/>
              <rect x="2" y="2" width="14" height="7" rx="1.5" fill={isWash ? "rgba(255,255,255,0.7)" : C.neutral[600]}/>
              <path d="M20 3.5v4a2 2 0 0 0 0-4z" fill={isWash ? "rgba(255,255,255,0.7)" : C.neutral[600]}/>
            </svg>
          </div>
        </div>

        {/* Header */}
        <div style={{
          flexShrink: 0,
          background: isWash ? t.washBg : t.headerBg,
          padding: "0 20px 20px",
          boxShadow: isWash ? "none" : t.headerShadow,
          position: "relative", overflow: "hidden",
        }}>
          {isWash && (
            <svg style={{ position:"absolute",inset:0,width:"100%",height:"100%",opacity:0.12,pointerEvents:"none" }}>
              <defs><pattern id="hdr-dots2" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
                <circle cx="2" cy="2" r="1.5" fill={t.washDot}/>
              </pattern></defs>
              <rect width="100%" height="100%" fill="url(#hdr-dots2)"/>
            </svg>
          )}
          {isWash && <div style={{ position:"absolute",right:-40,top:-40,width:160,height:160,borderRadius:"50%",background:"rgba(255,255,255,0.07)",pointerEvents:"none" }}/>}

          <div style={{ position:"relative", zIndex:1 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10, paddingTop:8 }}>
              <span style={{ fontSize:"0.75rem", fontWeight:600, letterSpacing:"0.04em", textTransform:"uppercase", color: isWash ? washSub : t.stepLabel }}>
                Step 2 of 3
              </span>
              <button style={{ fontSize:"0.8125rem", fontWeight:500, color: isWash ? washSub : C.neutral[400], background:"none", border:"none", cursor:"pointer" }}>
                Skip
              </button>
            </div>
            <ProgressSteps step={2} total={3}
              fillColor={isWash ? "rgba(255,255,255,0.9)" : t.progressFill}
              trackColor={isWash ? "rgba(255,255,255,0.25)" : t.progressBg}
            />
            <h1 style={{
              marginTop:14, fontSize:"1.5rem", fontWeight:700, lineHeight:1.2,
              letterSpacing:"-0.025em",
              color: isWash ? "#fff" : t.heading,
            }}>
              What tools do you<br />cook with?
            </h1>
            <p style={{ marginTop:6, fontSize:"0.875rem", lineHeight:1.5, color: isWash ? washSub : t.subtext }}>
              We'll only suggest recipes you can actually make.
            </p>
          </div>
        </div>

        {/* Content */}
        <div style={{ padding:"16px 20px 28px", display:"flex", flexDirection:"column", gap:16 }}>

          {/* Tools grid — single column for clarity */}
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {TOOLS.map(tool => (
              <ToolCard key={tool.id} tool={tool} selected={selected.has(tool.id)} onToggle={() => toggle(tool.id)} t={t} />
            ))}

            {/* Custom tools */}
            {customTools.map(tool => (
              <div key={tool.id} style={{
                display:"flex", alignItems:"center", gap:12,
                padding:"13px 14px",
                background: t.cardActiveBg,
                border:`1.5px solid ${t.cardActiveBorder}`,
                borderRadius:12,
                boxShadow: shadow.md,
              }}>
                <span style={{ fontSize:"1.375rem", lineHeight:1 }}>🔧</span>
                <span style={{ flex:1, fontSize:"0.9rem", fontWeight:600, color: t.cardActiveText }}>{tool.label}</span>
                <div style={{
                  width:22, height:22, borderRadius:6,
                  background: t.checkBg,
                  display:"flex", alignItems:"center", justifyContent:"center",
                }}>
                  <IconCheck />
                </div>
                <button onClick={() => removeCustom(tool.id)} style={{ display:"flex", padding:2, background:"none", border:"none", cursor:"pointer", opacity:0.5 }}>
                  <IconX size={14} color={t.cardActiveText} />
                </button>
              </div>
            ))}
          </div>

          {/* Add custom tool */}
          <div style={{
            background: t.cardBg,
            border:`1.5px solid ${t.cardBorder}`,
            borderRadius:12,
            boxShadow: shadow.sm,
            overflow:"hidden",
          }}>
            <div style={{ display:"flex", alignItems:"center", gap:10, padding:"12px 14px" }}>
              <div style={{
                width:22, height:22, borderRadius:6, flexShrink:0,
                border:`2px dashed ${t.cardActiveBorder}`,
                display:"flex", alignItems:"center", justifyContent:"center",
              }}>
                <IconPlus color={t.cardActiveBorder} />
              </div>
              <input
                ref={inputRef}
                value={inputVal}
                onChange={e => setInputVal(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter" && inputVal.trim()) addCustom(); }}
                placeholder="Add another tool…"
                style={{
                  flex:1, border:"none", background:"transparent", outline:"none",
                  fontSize:"0.9rem", color: t.inputText,
                }}
              />
              {inputVal.trim().length > 0 && (
                <button
                  onClick={addCustom}
                  style={{
                    padding:"5px 12px", borderRadius:8, border:"none", cursor:"pointer",
                    background: t.checkBg, color:"#fff",
                    fontSize:"0.8rem", fontWeight:600,
                  }}
                >
                  Add
                </button>
              )}
            </div>
          </div>

          {/* Assumed tools note */}
          <div style={{
            background: t.noteBg,
            border:`1px solid ${t.noteBorder}`,
            borderRadius:12, padding:"12px 14px",
            display:"flex", flexDirection:"column", gap:6,
          }}>
            <span style={{ fontSize:"0.8rem", fontWeight:600, color: t.noteText, letterSpacing:"0.02em", textTransform:"uppercase" }}>
              Always assumed ✓
            </span>
            <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
              {ASSUMED.map(item => (
                <span key={item} style={{
                  fontSize:"0.8125rem", color: t.noteText,
                  background: t.appBg,
                  border:`1px solid ${t.noteBorder}`,
                  borderRadius:9999, padding:"3px 10px",
                }}>
                  {item}
                </span>
              ))}
            </div>
          </div>

        </div>
      </div>{/* end scroll */}

      {/* ── Footer: Back + Next ── */}
      <div style={{
        flexShrink:0,
        background: t.appBg,
        borderTop:`1px solid ${t.cardBorder}`,
        padding:"14px 20px 28px",
        display:"flex", gap:10,
      }}>
        {/* Back */}
        <button
          onPointerDown={() => setBackPressed(true)}
          onPointerUp={() => setBackPressed(false)}
          onPointerLeave={() => setBackPressed(false)}
          style={{
            width:52, height:52, borderRadius:14, flexShrink:0,
            background: t.backBg,
            border:`1.5px solid ${t.backBorder}`,
            display:"flex", alignItems:"center", justifyContent:"center",
            cursor:"pointer",
            boxShadow: shadow.sm,
            transform: backPressed ? "scale(0.95)" : "scale(1)",
            transition:"all 0.12s ease",
          }}
        >
          <IconChevronLeft color={t.backText} />
        </button>

        {/* Next */}
        <button
          onPointerDown={() => setNextPressed(true)}
          onPointerUp={() => setNextPressed(false)}
          onPointerLeave={() => setNextPressed(false)}
          style={{
            flex:1, height:52, borderRadius:14,
            background: nextPressed ? t.ctaPressed : `linear-gradient(160deg, ${t.ctaFrom} 0%, ${t.ctaTo} 100%)`,
            color:"#fff",
            fontSize:"1rem", fontWeight:600,
            border:"none", cursor:"pointer",
            display:"flex", alignItems:"center", justifyContent:"center", gap:8,
            boxShadow: nextPressed ? shadow.sm : `0 6px 20px ${t.ctaShadow}, ${shadow.md}`,
            transform: nextPressed ? "scale(0.985)" : "scale(1)",
            transition:"all 0.12s ease",
            letterSpacing:"-0.01em",
          }}
        >
          {totalSelected === 0
            ? "Skip for now"
            : `Continue — ${totalSelected} tool${totalSelected !== 1 ? "s" : ""}`
          }
          <IconArrowRight />
        </button>
      </div>

      {/* ── Tweaks Panel ── */}
      <TweaksPanel>
        <TweakSection label="Mood" />
        <TweakRadio options={["Calm","Warm","Bold"]} value={mood} onChange={v => setTweak("mood", v)} />
        <TweakSection label="Header Style" />
        <TweakRadio options={["Standard","Color Wash"]} value={headerStyle} onChange={v => setTweak("headerStyle", v)} />
      </TweaksPanel>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
