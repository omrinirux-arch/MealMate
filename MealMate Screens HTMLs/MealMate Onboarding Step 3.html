<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MealMate — Preferences</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { margin: 0; background: #d4cdc4; }
    body { display: flex; justify-content: center; font-family: 'DM Sans', sans-serif; }
    #root {
      position: fixed; top: 0; bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 390px;
      display: flex; flex-direction: column; overflow: hidden;
    }
    button, input, textarea { font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

// ── Tokens ────────────────────────────────────────────────
const C = {
  primary:   { 50:"#f4f7f4",100:"#e4ebe4",200:"#c9d8c9",300:"#a3bda3",400:"#7a9e7a",500:"#5a8a5a",600:"#4a7a4a",700:"#3d633d",800:"#334f33",900:"#2a422a" },
  secondary: { 50:"#fdf5f0",100:"#fae8dc",200:"#f4cdb5",300:"#edae88",400:"#e08c5a",500:"#d4723e",600:"#bf5c2e",700:"#9e4a27" },
  neutral:   { 0:"#ffffff",50:"#faf8f6",100:"#f3f0ec",200:"#e8e3dd",300:"#d4cdc4",400:"#b5aca0",500:"#968b7d",600:"#7a6f63",700:"#615851",800:"#4a4340",900:"#352f2d",950:"#1e1b19" },
};
const shadow = {
  sm: "0 1px 3px rgba(53,47,45,0.06), 0 1px 2px rgba(53,47,45,0.04)",
  md: "0 4px 12px rgba(53,47,45,0.08), 0 2px 4px rgba(53,47,45,0.04)",
};

// ── Themes ────────────────────────────────────────────────
const THEMES = {
  Calm: {
    appBg: C.neutral[50], headerBg: C.neutral[50],
    cardBg: C.neutral[0], cardBorder: C.neutral[200],
    heading: C.neutral[900], subtext: C.neutral[500],
    sectionLabel: C.neutral[600], sectionBorder: C.neutral[200],
    chipBg: C.neutral[0], chipBorder: C.neutral[300], chipText: C.neutral[700],
    chipActiveBg: C.primary[600], chipActiveBorder: C.primary[600], chipActiveText: "#fff",
    spiceBg: C.neutral[100], spiceBorder: C.neutral[200],
    spiceActiveBg: C.primary[600], spiceActiveText: "#fff",
    inputBg: C.neutral[0], inputBorder: C.neutral[200], inputText: C.neutral[900],
    ctaFrom: C.primary[500], ctaTo: C.primary[600], ctaPressed: C.primary[700],
    ctaShadow: "rgba(74,122,74,0.28)",
    backBg: C.neutral[0], backBorder: C.neutral[300], backText: C.neutral[700],
    progressFill: C.primary[500], progressBg: C.neutral[200],
    washBg: null, washDot: null,
    headerShadow: "0 1px 0 rgba(53,47,45,0.06)",
    footerBorder: C.neutral[200],
    tagBg: C.neutral[100], tagBorder: C.neutral[200], tagText: C.neutral[600],
    stepLabel: C.neutral[500],
  },
  Warm: {
    appBg: "#fdf5f0", headerBg: "#fdf5f0",
    cardBg: "#fffaf7", cardBorder: C.secondary[200],
    heading: C.neutral[900], subtext: C.neutral[600],
    sectionLabel: C.neutral[600], sectionBorder: C.secondary[200],
    chipBg: "#fffaf7", chipBorder: C.neutral[300], chipText: C.neutral[700],
    chipActiveBg: C.secondary[600], chipActiveBorder: C.secondary[600], chipActiveText: "#fff",
    spiceBg: C.secondary[50], spiceBorder: C.secondary[200],
    spiceActiveBg: C.secondary[500], spiceActiveText: "#fff",
    inputBg: "#fffaf7", inputBorder: C.secondary[200], inputText: C.neutral[900],
    ctaFrom: C.secondary[400], ctaTo: C.secondary[600], ctaPressed: C.secondary[700],
    ctaShadow: "rgba(191,92,46,0.28)",
    backBg: "#fffaf7", backBorder: C.secondary[200], backText: C.neutral[700],
    progressFill: C.secondary[500], progressBg: C.neutral[200],
    washBg: C.secondary[500], washDot: C.secondary[300],
    headerShadow: "0 1px 0 rgba(191,92,46,0.08)",
    footerBorder: C.secondary[200],
    tagBg: C.secondary[50], tagBorder: C.secondary[200], tagText: C.secondary[700],
    stepLabel: C.neutral[500],
  },
  Bold: {
    appBg: C.neutral[950], headerBg: C.neutral[950],
    cardBg: "#2a2520", cardBorder: "#4a433d",
    heading: "#f3f0ec", subtext: C.neutral[400],
    sectionLabel: C.neutral[500], sectionBorder: "#4a433d",
    chipBg: "#2a2520", chipBorder: "#5a5248", chipText: C.neutral[300],
    chipActiveBg: C.primary[600], chipActiveBorder: C.primary[600], chipActiveText: "#fff",
    spiceBg: "#332d28", spiceBorder: "#4a433d",
    spiceActiveBg: C.primary[500], spiceActiveText: "#fff",
    inputBg: "#2a2520", inputBorder: "#4a433d", inputText: "#f3f0ec",
    ctaFrom: C.primary[400], ctaTo: C.primary[600], ctaPressed: C.primary[700],
    ctaShadow: "rgba(90,138,90,0.35)",
    backBg: "#2a2520", backBorder: "#4a433d", backText: C.neutral[300],
    progressFill: C.primary[400], progressBg: "#3a342e",
    washBg: C.primary[800], washDot: C.primary[400],
    headerShadow: "0 1px 0 rgba(0,0,0,0.3)",
    footerBorder: "#4a433d",
    tagBg: "#2a2520", tagBorder: "#4a433d", tagText: C.neutral[400],
    stepLabel: C.neutral[500],
  },
};

// ── Data ──────────────────────────────────────────────────
const DIETARY_GOALS = [
  { id:"cholesterol", label:"Lower cholesterol" },
  { id:"lose-weight", label:"Lose weight" },
  { id:"muscle",      label:"Build muscle / high protein" },
  { id:"heart",       label:"Heart healthy" },
  { id:"low-sodium",  label:"Low sodium" },
  { id:"balanced",    label:"Balanced / no specific goal" },
];
const RECIPE_STYLES = [
  { id:"quick",       label:"Quick & easy", sub:"under 30 min" },
  { id:"one-pan",     label:"One-pan / one-pot" },
  { id:"meal-prep",   label:"Meal prep friendly", sub:"great leftovers" },
  { id:"involved",    label:"More involved", sub:"weekend project" },
  { id:"kid-friendly",label:"Kid-friendly", sub:"mild flavors" },
];
const SPICE_LEVELS = [
  { id:"none",   label:"None",  emoji:"🧊" },
  { id:"mild",   label:"Mild",  emoji:"🌿" },
  { id:"medium", label:"Medium",emoji:"🌶️" },
  { id:"hot",    label:"Hot",   emoji:"🔥" },
];

// ── Icons ─────────────────────────────────────────────────
function IconCheck({ size=12, color="#fff" }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="3.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M20 6L9 17l-5-5"/>
    </svg>
  );
}
function IconChevronLeft({ color }) {
  return (
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={color||C.neutral[700]} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
      <path d="M15 18l-6-6 6-6"/>
    </svg>
  );
}
function IconSparkle({ size=16 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
    </svg>
  );
}
function IconX({ size=12, color }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round">
      <path d="M18 6L6 18M6 6l12 12"/>
    </svg>
  );
}

// ── Progress bar ──────────────────────────────────────────
function ProgressSteps({ step, total, fillColor, trackColor }) {
  return (
    <div style={{ display:"flex", gap:6 }}>
      {Array.from({ length: total }, (_, i) => (
        <div key={i} style={{
          height:4, flex:1, borderRadius:9999,
          background: i < step ? (fillColor||C.primary[500]) : (trackColor||C.neutral[200]),
          transition:"background 0.3s ease",
        }}/>
      ))}
    </div>
  );
}

// ── Section wrapper ───────────────────────────────────────
function Section({ label, hint, children, t }) {
  return (
    <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
      <div>
        <span style={{ fontSize:"0.8125rem", fontWeight:700, color: t.sectionLabel, letterSpacing:"0.03em", textTransform:"uppercase" }}>
          {label}
        </span>
        {hint && <p style={{ fontSize:"0.8rem", color: t.subtext, marginTop:2, lineHeight:1.4 }}>{hint}</p>}
      </div>
      {children}
    </div>
  );
}

// ── Multi-select chip ─────────────────────────────────────
function PrefChip({ item, active, onToggle, t }) {
  const [pressed, setPressed] = React.useState(false);
  return (
    <button
      onPointerDown={() => setPressed(true)}
      onPointerUp={() => { setPressed(false); onToggle(); }}
      onPointerLeave={() => setPressed(false)}
      style={{
        display:"inline-flex", alignItems:"center", gap:6,
        padding: active ? "8px 14px 8px 10px" : "8px 14px",
        borderRadius:9999,
        background: active ? t.chipActiveBg : t.chipBg,
        color: active ? t.chipActiveText : t.chipText,
        border:`1.5px solid ${active ? t.chipActiveBorder : t.chipBorder}`,
        fontSize:"0.875rem", fontWeight: active ? 600 : 400,
        cursor:"pointer",
        boxShadow: active ? shadow.sm : "none",
        transform: pressed ? "scale(0.95)" : "scale(1)",
        transition:"all 0.12s ease",
        whiteSpace:"nowrap",
      }}
    >
      {active && (
        <span style={{
          width:16, height:16, borderRadius:"50%",
          background:"rgba(255,255,255,0.25)",
          display:"inline-flex", alignItems:"center", justifyContent:"center", flexShrink:0,
        }}>
          <IconCheck size={10} color="#fff" />
        </span>
      )}
      <span>{item.label}</span>
      {item.sub && !active && (
        <span style={{ fontSize:"0.75rem", opacity:0.65 }}>· {item.sub}</span>
      )}
    </button>
  );
}

// ── Spice selector ────────────────────────────────────────
function SpiceSelector({ value, onChange, t }) {
  return (
    <div style={{
      display:"flex", gap:0,
      background: t.spiceBg,
      border:`1.5px solid ${t.spiceBorder}`,
      borderRadius:12, padding:4,
    }}>
      {SPICE_LEVELS.map(level => {
        const active = value === level.id;
        return (
          <button
            key={level.id}
            onClick={() => onChange(level.id)}
            style={{
              flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:3,
              padding:"10px 4px 8px",
              borderRadius:9,
              background: active ? t.spiceActiveBg : "transparent",
              border:"none", cursor:"pointer",
              transition:"all 0.15s ease",
              boxShadow: active ? shadow.sm : "none",
            }}
          >
            <span style={{ fontSize:"1.25rem", lineHeight:1 }}>{level.emoji}</span>
            <span style={{
              fontSize:"0.75rem", fontWeight: active ? 700 : 400,
              color: active ? t.spiceActiveText : t.subtext,
              letterSpacing:"0.01em",
            }}>
              {level.label}
            </span>
          </button>
        );
      })}
    </div>
  );
}

// ── Exclusion tag ─────────────────────────────────────────
function ExclusionTag({ label, onRemove, t }) {
  return (
    <span style={{
      display:"inline-flex", alignItems:"center", gap:5,
      padding:"4px 10px 4px 12px",
      background: t.tagBg, color: t.tagText,
      border:`1px solid ${t.tagBorder}`,
      borderRadius:9999, fontSize:"0.8125rem", fontWeight:500,
    }}>
      {label}
      <button
        onClick={onRemove}
        style={{ display:"flex", background:"none", border:"none", cursor:"pointer", padding:1, opacity:0.6 }}
      >
        <IconX size={12} color={t.tagText} />
      </button>
    </span>
  );
}

// ── Tweak defaults ────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "mood": "Warm",
  "headerStyle": "Color Wash"
}/*EDITMODE-END*/;

// ── Main App ──────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const { mood, headerStyle } = tweaks;
  const t = THEMES[mood] || THEMES.Calm;
  const isWash = headerStyle === "Color Wash" && t.washBg;
  const washText = "rgba(255,255,255,0.9)";
  const washSub  = "rgba(255,255,255,0.65)";

  const [goals,       setGoals]       = React.useState(new Set());
  const [styles,      setStyles]      = React.useState(new Set());
  const [spice,       setSpice]       = React.useState("mild");
  const [exclusions,  setExclusions]  = React.useState([]);
  const [exclInput,   setExclInput]   = React.useState("");
  const [finishPress, setFinishPress] = React.useState(false);
  const [backPress,   setBackPress]   = React.useState(false);
  const exclRef = React.useRef(null);

  const toggleSet = (setter, id) => setter(prev => {
    const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n;
  });

  const addExclusion = (raw) => {
    const parts = raw.split(/[,;]+/).map(s => s.trim()).filter(Boolean);
    parts.forEach(p => {
      if (!exclusions.includes(p)) setExclusions(prev => [...prev, p]);
    });
    setExclInput("");
  };

  const handleExclKey = (e) => {
    if ((e.key === "Enter" || e.key === ",") && exclInput.trim()) {
      e.preventDefault(); addExclusion(exclInput);
    }
    if (e.key === "Backspace" && !exclInput && exclusions.length > 0) {
      setExclusions(prev => prev.slice(0, -1));
    }
  };

  const isReady = goals.size > 0 || styles.size > 0;

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background: t.appBg, fontFamily:"'DM Sans', sans-serif" }}>

      {/* ── Scroll area ── */}
      <div style={{ flex:1, minHeight:0, overflowY:"auto", display:"flex", flexDirection:"column" }}>

        {/* Status bar */}
        <div style={{
          height:44, flexShrink:0,
          background: isWash ? t.washBg : t.headerBg,
          display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 24px",
        }}>
          <span style={{ fontSize:"0.875rem", fontWeight:600, color: isWash ? washText : t.heading }}>9:41</span>
          <div style={{ display:"flex", gap:6, alignItems:"center" }}>
            <svg width="16" height="12" viewBox="0 0 16 12" fill={isWash ? "rgba(255,255,255,0.7)" : C.neutral[600]}>
              <rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/>
              <rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1"/>
            </svg>
            <svg width="22" height="11" viewBox="0 0 22 11" fill="none">
              <rect x="0.5" y="0.5" width="18" height="10" rx="2.5" stroke={isWash ? "rgba(255,255,255,0.7)" : C.neutral[600]} strokeWidth="1"/>
              <rect x="2" y="2" width="14" height="7" rx="1.5" fill={isWash ? "rgba(255,255,255,0.7)" : C.neutral[600]}/>
              <path d="M20 3.5v4a2 2 0 0 0 0-4z" fill={isWash ? "rgba(255,255,255,0.7)" : C.neutral[600]}/>
            </svg>
          </div>
        </div>

        {/* Header */}
        <div style={{
          flexShrink:0,
          background: isWash ? t.washBg : t.headerBg,
          padding:"0 20px 20px",
          boxShadow: isWash ? "none" : t.headerShadow,
          position:"relative", overflow:"hidden",
        }}>
          {isWash && (
            <svg style={{ position:"absolute",inset:0,width:"100%",height:"100%",opacity:0.12,pointerEvents:"none" }}>
              <defs><pattern id="hdr-dots3" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
                <circle cx="2" cy="2" r="1.5" fill={t.washDot}/>
              </pattern></defs>
              <rect width="100%" height="100%" fill="url(#hdr-dots3)"/>
            </svg>
          )}
          {isWash && <div style={{ position:"absolute",right:-40,top:-40,width:160,height:160,borderRadius:"50%",background:"rgba(255,255,255,0.07)",pointerEvents:"none" }}/>}

          <div style={{ position:"relative", zIndex:1 }}>
            <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", paddingTop:8, marginBottom:10 }}>
              <span style={{ fontSize:"0.75rem", fontWeight:600, letterSpacing:"0.04em", textTransform:"uppercase", color: isWash ? washSub : t.stepLabel }}>
                Step 3 of 3
              </span>
              <span style={{ fontSize:"0.75rem", fontWeight:500, color: isWash ? washSub : t.subtext }}>
                Last step 🎉
              </span>
            </div>
            <ProgressSteps step={3} total={3}
              fillColor={isWash ? "rgba(255,255,255,0.9)" : t.progressFill}
              trackColor={isWash ? "rgba(255,255,255,0.25)" : t.progressBg}
            />
            <h1 style={{
              marginTop:14, fontSize:"1.5rem", fontWeight:700,
              lineHeight:1.2, letterSpacing:"-0.025em",
              color: isWash ? "#fff" : t.heading,
            }}>
              How do you like<br />to eat?
            </h1>
            <p style={{ marginTop:6, fontSize:"0.875rem", lineHeight:1.5, color: isWash ? washSub : t.subtext }}>
              Shape your recommendations — you can always change these later.
            </p>
          </div>
        </div>

        {/* Preference sections */}
        <div style={{ padding:"20px 20px 32px", display:"flex", flexDirection:"column", gap:28 }}>

          {/* ── Dietary goals ── */}
          <Section label="Dietary goals" hint="Pick any that apply — or none." t={t}>
            <div style={{
              background: t.cardBg, borderRadius:14,
              border:`1px solid ${t.cardBorder}`,
              boxShadow: shadow.sm, padding:"16px",
            }}>
              <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                {DIETARY_GOALS.map(g => (
                  <PrefChip key={g.id} item={g} active={goals.has(g.id)} onToggle={() => toggleSet(setGoals, g.id)} t={t} />
                ))}
              </div>
            </div>
          </Section>

          {/* Divider */}
          <div style={{ height:1, background: t.sectionBorder, marginLeft:4 }}/>

          {/* ── Recipe style ── */}
          <Section label="Recipe style" hint="What kinds of cooking do you enjoy?" t={t}>
            <div style={{
              background: t.cardBg, borderRadius:14,
              border:`1px solid ${t.cardBorder}`,
              boxShadow: shadow.sm, padding:"16px",
            }}>
              <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                {RECIPE_STYLES.map(s => (
                  <PrefChip key={s.id} item={s} active={styles.has(s.id)} onToggle={() => toggleSet(setStyles, s.id)} t={t} />
                ))}
              </div>
            </div>
          </Section>

          {/* Divider */}
          <div style={{ height:1, background: t.sectionBorder, marginLeft:4 }}/>

          {/* ── Spice tolerance ── */}
          <Section label="Spice tolerance" t={t}>
            <SpiceSelector value={spice} onChange={setSpice} t={t} />
          </Section>

          {/* Divider */}
          <div style={{ height:1, background: t.sectionBorder, marginLeft:4 }}/>

          {/* ── Exclusions ── */}
          <Section label="Ingredients to avoid" hint="Allergies, dislikes, or things you never cook with." t={t}>
            <div style={{
              background: t.cardBg,
              border:`1.5px solid ${t.inputBorder}`,
              borderRadius:14, boxShadow: shadow.sm,
              padding:"12px 14px",
              display:"flex", flexDirection:"column", gap:10,
            }}>
              {/* Tags */}
              {exclusions.length > 0 && (
                <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                  {exclusions.map(exc => (
                    <ExclusionTag key={exc} label={exc} onRemove={() => setExclusions(prev => prev.filter(x => x !== exc))} t={t} />
                  ))}
                </div>
              )}
              {/* Input */}
              <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                <input
                  ref={exclRef}
                  value={exclInput}
                  onChange={e => setExclInput(e.target.value)}
                  onKeyDown={handleExclKey}
                  onBlur={() => { if (exclInput.trim()) addExclusion(exclInput); }}
                  placeholder={exclusions.length === 0 ? "e.g. mushrooms, shellfish, peanuts" : "Add more…"}
                  style={{
                    flex:1, border:"none", background:"transparent", outline:"none",
                    fontSize:"0.9rem", color: t.inputText,
                    minWidth:0,
                  }}
                />
                {exclInput.trim() && (
                  <button
                    onClick={() => addExclusion(exclInput)}
                    style={{
                      padding:"4px 10px", borderRadius:8, border:"none", cursor:"pointer",
                      background: t.chipActiveBg, color:"#fff",
                      fontSize:"0.8rem", fontWeight:600, flexShrink:0,
                    }}
                  >Add</button>
                )}
              </div>
              <p style={{ fontSize:"0.75rem", color: t.subtext, lineHeight:1.4 }}>
                Separate with commas or press Enter. These are hard exclusions — matching recipes will never appear.
              </p>
            </div>
          </Section>

        </div>
      </div>{/* end scroll */}

      {/* ── Footer ── */}
      <div style={{
        flexShrink:0,
        background: t.appBg,
        borderTop:`1px solid ${t.footerBorder}`,
        padding:"14px 20px 28px",
        display:"flex", gap:10,
      }}>
        {/* Back */}
        <button
          onPointerDown={() => setBackPress(true)}
          onPointerUp={() => setBackPress(false)}
          onPointerLeave={() => setBackPress(false)}
          style={{
            width:52, height:52, borderRadius:14, flexShrink:0,
            background: t.backBg, border:`1.5px solid ${t.backBorder}`,
            display:"flex", alignItems:"center", justifyContent:"center",
            cursor:"pointer", boxShadow: shadow.sm,
            transform: backPress ? "scale(0.95)" : "scale(1)",
            transition:"all 0.12s ease",
          }}
        >
          <IconChevronLeft color={t.backText} />
        </button>

        {/* Finish Setup */}
        <button
          onPointerDown={() => setFinishPress(true)}
          onPointerUp={() => setFinishPress(false)}
          onPointerLeave={() => setFinishPress(false)}
          style={{
            flex:1, height:52, borderRadius:14,
            background: finishPress ? t.ctaPressed : `linear-gradient(160deg, ${t.ctaFrom} 0%, ${t.ctaTo} 100%)`,
            color:"#fff",
            fontSize:"1rem", fontWeight:600,
            border:"none", cursor:"pointer",
            display:"flex", alignItems:"center", justifyContent:"center", gap:8,
            boxShadow: finishPress ? shadow.sm : `0 6px 20px ${t.ctaShadow}, ${shadow.md}`,
            transform: finishPress ? "scale(0.985)" : "scale(1)",
            transition:"all 0.12s ease",
            letterSpacing:"-0.01em",
          }}
        >
          <IconSparkle size={16} />
          Finish Setup
        </button>
      </div>

      {/* ── Tweaks ── */}
      <TweaksPanel>
        <TweakSection label="Mood" />
        <TweakRadio options={["Calm","Warm","Bold"]} value={mood} onChange={v => setTweak("mood", v)} />
        <TweakSection label="Header Style" />
        <TweakRadio options={["Standard","Color Wash"]} value={headerStyle} onChange={v => setTweak("headerStyle", v)} />
      </TweaksPanel>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
