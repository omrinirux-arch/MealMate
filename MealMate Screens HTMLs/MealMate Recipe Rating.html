<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MealMate — Rate Your Meals</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { margin: 0; background: #c9c2ba; }
    body { display: flex; justify-content: center; font-family: 'DM Sans', sans-serif; }
    #root {
      position: fixed; top: 0; bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 390px;
      display: flex; flex-direction: column; overflow: hidden;
    }
    button { font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; background: none; }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes thanksPop {
      0%   { transform: scale(0.85); opacity: 0; }
      60%  { transform: scale(1.06); }
      100% { transform: scale(1);    opacity: 1; }
    }
    @keyframes fadeOut {
      from { opacity: 1; max-height: 200px; }
      to   { opacity: 0; max-height: 0; }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const C = {
  primary:   { 50:"#f4f7f4",100:"#e4ebe4",200:"#c9d8c9",300:"#a3bda3",400:"#7a9e7a",500:"#5a8a5a",600:"#4a7a4a",700:"#3d633d",800:"#334f33",900:"#2a422a" },

const shadow = {

  md: "0 4px 14px rgba(53,47,45,0.10), 0 2px 4px rgba(53,47,45,0.05)",
  lg: "0 8px 28px rgba(53,47,45,0.13), 0 4px 10px rgba(53,47,45,0.06)",

const THEMES = {
  Calm: {
    appBg: C.neutral[50], headerBg: C.neutral[0], headerBorder: C.neutral[200],
    heading: C.neutral[900], subtext: C.neutral[500], micro: C.neutral[400],
    cardBg: C.neutral[0], cardBorder: C.neutral[200],
    ratingCardBg: C.neutral[0],
    ratingCardBorder: C.primary[200],
    ratingCardAccent: C.primary[500],
    upBg: C.primary[50], upBorder: C.primary[200], upText: C.primary[700],
    upActiveBg: C.primary[500], upActiveText: "#fff",
    downBg: C.neutral[100], downBorder: C.neutral[200], downText: C.neutral[600],
    downActiveBg: C.neutral[700], downActiveText: "#fff",
    dismissText: C.neutral[400],
    thanksUpBg: C.primary[50], thanksUpText: C.primary[700], thanksUpBorder: C.primary[200],
    thanksDownBg: C.neutral[100], thanksDownText: C.neutral[600], thanksDownBorder: C.neutral[200],
    weekBg: C.neutral[0], weekBorder: C.neutral[200],
    dayBg: C.neutral[50], dayBorder: C.neutral[200],
    tagBg: C.primary[50], tagBorder: C.primary[200], tagText: C.primary[700],
    navBg: C.neutral[0], navBorder: C.neutral[200],
    navActive: C.primary[600], navInactive: C.neutral[400],
    dotActive: C.primary[500], dotInactive: C.neutral[200],
    pillBg: C.primary[100], pillText: C.primary[700],
    statusColor: C.neutral[600],
  },
  Warm: {
    appBg: "#fdf5f0", headerBg: "#fffaf7", headerBorder: C.secondary[200],
    heading: C.neutral[900], subtext: C.neutral[600], micro: C.neutral[400],
    cardBg: "#fffaf7", cardBorder: C.secondary[200],
    ratingCardBg: "#fffaf7",
    ratingCardBorder: C.secondary[300],
    ratingCardAccent: C.secondary[500],
    upBg: C.primary[50], upBorder: C.primary[200], upText: C.primary[700],
    upActiveBg: C.primary[500], upActiveText: "#fff",
    downBg: C.secondary[50], downBorder: C.secondary[200], downText: C.secondary[700],
    downActiveBg: C.secondary[600], downActiveText: "#fff",
    dismissText: C.neutral[400],
    thanksUpBg: C.primary[50], thanksUpText: C.primary[700], thanksUpBorder: C.primary[200],
    thanksDownBg: C.secondary[50], thanksDownText: C.secondary[700], thanksDownBorder: C.secondary[200],
    weekBg: "#fffaf7", weekBorder: C.secondary[200],
    dayBg: C.secondary[50], dayBorder: C.secondary[200],
    tagBg: C.secondary[50], tagBorder: C.secondary[200], tagText: C.secondary[700],
    navBg: "#fffaf7", navBorder: C.secondary[200],
    navActive: C.secondary[600], navInactive: C.neutral[400],
    dotActive: C.secondary[500], dotInactive: C.neutral[200],
    pillBg: C.secondary[100], pillText: C.secondary[700],
    statusColor: C.neutral[600],
  },
  Bold: {
    appBg: C.neutral[950], headerBg: "#1e1b19", headerBorder: "#3a342e",
    heading: "#f3f0ec", subtext: C.neutral[400], micro: C.neutral[600],
    cardBg: "#2a2520", cardBorder: "#4a433d",
    ratingCardBg: "#2a2520",
    ratingCardBorder: C.primary[700],
    ratingCardAccent: C.primary[400],
    upBg: "#2e3a2e", upBorder: C.primary[700], upText: C.primary[400],
    upActiveBg: C.primary[500], upActiveText: "#fff",
    downBg: "#332d28", downBorder: "#5a5248", downText: C.neutral[400],
    downActiveBg: "#615851", downActiveText: "#f3f0ec",
    dismissText: C.neutral[600],
    thanksUpBg: "#2e3a2e", thanksUpText: C.primary[400], thanksUpBorder: C.primary[700],
    thanksDownBg: "#332d28", thanksDownText: C.neutral[400], thanksDownBorder: "#5a5248",
    weekBg: "#2a2520", weekBorder: "#4a433d",
    dayBg: "#332d28", dayBorder: "#4a433d",
    tagBg: "#2e3a2e", tagBorder: C.primary[800], tagText: C.primary[400],
    navBg: "#1e1b19", navBorder: "#3a342e",
    navActive: C.primary[400], navInactive: C.neutral[600],
    dotActive: C.primary[400], dotInactive: "#3a342e",
    pillBg: "#2e3a2e", pillText: C.primary[400],
    statusColor: C.neutral[500],
  },
};

// ── Unrated recipes queue ─────────────────────────────────
const UNRATED = [
  { id:1, name:"Honey Garlic Salmon",          date:"Mon, Apr 28", emoji:"🐟" },
  { id:2, name:"Turkey Taco Bowls",             date:"Tue, Apr 29", emoji:"🌮" },
  { id:3, name:"Baked Salmon & Asparagus",      date:"Fri, May 2",  emoji:"🥗" },
];

// ── This week mini-plan ───────────────────────────────────
const THIS_WEEK = [
  { day:"Wed", recipe:"Sheet Pan Chicken", done:false },
  { day:"Thu", recipe:"Beef & Broccoli",   done:false },
  { day:"Sat", recipe:"Eating out",        done:false, skip:true },
  { day:"Sun", recipe:"Veggie Curry",      done:false },
];

// ── Icons ─────────────────────────────────────────────────
function IconThumbUp({ size=28, color }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3H14z"/>
      <path d="M7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"/>
    </svg>
  );
}
function IconThumbDown({ size=28, color }) {
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
      <path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3H10z"/>
      <path d="M17 2h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"/>
    </svg>
  );
}
function IconHome({ color }) {
  return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>;
}
function IconList({ color }) {
  return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 6h11M9 12h11M9 18h11"/><circle cx="4.5" cy="6" r="1" fill={color} stroke="none"/><circle cx="4.5" cy="12" r="1" fill={color} stroke="none"/><circle cx="4.5" cy="18" r="1" fill={color} stroke="none"/></svg>;
}
function IconSettings({ color }) {
  return <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
}
function IconChevronRight({ color, size=13 }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>;
}

// ── Rating card ───────────────────────────────────────────
function RatingCard({ recipe, remaining, onRate, onDismiss, t }) {
  const [voted,    setVoted]    = React.useState(null); // 'up' | 'down'
  const [exiting,  setExiting]  = React.useState(false);
  const [upPress,  setUpPress]  = React.useState(false);
  const [dnPress,  setDnPress]  = React.useState(false);

  const handleVote = (dir) => {
    if (voted) return;
    setVoted(dir);
    setTimeout(() => {
      setExiting(true);
      setTimeout(() => onRate(recipe.id, dir), 350);
    }, 900);
  };

  return (
    <div style={{
      animation: exiting ? "fadeOut 0.35s ease forwards" : "slideDown 0.25s ease",
      overflow: exiting ? "hidden" : "visible",
    }}>
      <div style={{
        background: t.ratingCardBg,
        border:`1.5px solid ${t.ratingCardBorder}`,
        borderRadius:16,
        boxShadow: shadow.md,
        overflow:"hidden",
      }}>
        {/* Accent stripe */}
        <div style={{ height:3, background: t.ratingCardAccent, borderRadius:"16px 16px 0 0" }}/>

        <div style={{ padding:"14px 16px 16px" }}>
          {/* Header row */}
          <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:12 }}>
            <div style={{ display:"flex", flexDirection:"column", gap:2 }}>
              <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                <span style={{ fontSize:"1rem" }}>{recipe.emoji}</span>
                <span style={{ fontSize:"0.75rem", fontWeight:600, color: t.ratingCardAccent, textTransform:"uppercase", letterSpacing:"0.04em" }}>
                  How was it?
                </span>
              </div>
              <span style={{ fontSize:"1rem", fontWeight:700, color: t.heading, lineHeight:1.25, marginTop:2 }}>
                {recipe.name}
              </span>
              <span style={{ fontSize:"0.75rem", color: t.subtext }}>
                Cooked {recipe.date}
              </span>
            </div>
            {remaining > 1 && (
              <span style={{
                fontSize:"0.6875rem", fontWeight:600, flexShrink:0,
                padding:"2px 8px", borderRadius:9999,
                background: t.pillBg, color: t.pillText,
                marginTop:2,
              }}>
                1 of {remaining}
              </span>
            )}
          </div>

          {/* Vote buttons or thanks */}
          {!voted ? (
            <div style={{ display:"flex", gap:10 }}>
              {/* Thumbs up */}
              <button
                onPointerDown={() => setUpPress(true)}
                onPointerUp={() => { setUpPress(false); handleVote("up"); }}
                onPointerLeave={() => setUpPress(false)}
                style={{
                  flex:1, height:56,
                  display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:5,
                  background: t.upBg, border:`1.5px solid ${t.upBorder}`,
                  borderRadius:12, cursor:"pointer",
                  transform: upPress ? "scale(0.94)" : "scale(1)",
                  transition:"all 0.1s ease",
                  boxShadow: upPress ? "none" : shadow.sm,
                }}
              >
                <IconThumbUp size={24} color={t.upText}/>
                <span style={{ fontSize:"0.75rem", fontWeight:600, color: t.upText }}>Loved it</span>
              </button>

              {/* Thumbs down */}
              <button
                onPointerDown={() => setDnPress(true)}
                onPointerUp={() => { setDnPress(false); handleVote("down"); }}
                onPointerLeave={() => setDnPress(false)}
                style={{
                  flex:1, height:56,
                  display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:5,
                  background: t.downBg, border:`1.5px solid ${t.downBorder}`,
                  borderRadius:12, cursor:"pointer",
                  transform: dnPress ? "scale(0.94)" : "scale(1)",
                  transition:"all 0.1s ease",
                  boxShadow: dnPress ? "none" : shadow.sm,
                }}
              >
                <IconThumbDown size={24} color={t.downText}/>
                <span style={{ fontSize:"0.75rem", fontWeight:600, color: t.downText }}>Not for us</span>
              </button>
            </div>
          ) : (
            /* Thanks state */
            <div style={{
              height:56, borderRadius:12,
              background: voted === "up" ? t.thanksUpBg : t.thanksDownBg,
              border:`1.5px solid ${voted === "up" ? t.thanksUpBorder : t.thanksDownBorder}`,
              display:"flex", alignItems:"center", justifyContent:"center", gap:10,
              animation:"thanksPop 0.3s ease",
            }}>
              <span style={{ fontSize:"1.375rem" }}>{voted === "up" ? "🎉" : "👋"}</span>
              <span style={{
                fontSize:"0.9375rem", fontWeight:600,
                color: voted === "up" ? t.thanksUpText : t.thanksDownText,
              }}>
                {voted === "up" ? "Great — we'll suggest it again!" : "Got it — won't suggest it again."}
              </span>
            </div>
          )}

          {/* Dismiss */}
          {!voted && (
            <button
              onClick={() => onDismiss(recipe.id)}
              style={{
                display:"block", margin:"10px auto 0",
                fontSize:"0.8125rem", color: t.dismissText,
                background:"none", border:"none", cursor:"pointer",
                textDecoration:"underline", textUnderlineOffset:2,
              }}
            >
              Not now
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

// ── This week mini card ───────────────────────────────────
function ThisWeekCard({ t }) {
  return (
    <div style={{
      background: t.weekBg, borderRadius:14,
      border:`1px solid ${t.weekBorder}`,
      boxShadow: shadow.sm, overflow:"hidden",
    }}>
      <div style={{
        display:"flex", alignItems:"center", justifyContent:"space-between",
        padding:"12px 16px 10px",
        borderBottom:`1px solid ${t.weekBorder}`,
      }}>
        <span style={{ fontSize:"0.875rem", fontWeight:700, color: t.heading }}>
          Remaining this week
        </span>
        <button style={{
          display:"flex", alignItems:"center", gap:3,
          fontSize:"0.75rem", fontWeight:500, color: t.ratingCardAccent,
          background:"none", border:"none", cursor:"pointer",
        }}>
          Full plan <IconChevronRight color={t.ratingCardAccent}/>
        </button>
      </div>
      {THIS_WEEK.map((d, i) => (
        <div key={i} style={{
          display:"flex", alignItems:"center",
          padding:"10px 16px",
          borderBottom: i < THIS_WEEK.length-1 ? `1px solid ${t.weekBorder}` : "none",
          gap:12,
        }}>
          <span style={{
            fontSize:"0.75rem", fontWeight:700, color: t.subtext,
            width:28, flexShrink:0, textTransform:"uppercase", letterSpacing:"0.03em",
          }}>{d.day}</span>
          <span style={{
            flex:1, fontSize:"0.875rem", fontWeight:500,
            color: d.skip ? t.subtext : t.heading,
            fontStyle: d.skip ? "italic" : "normal",
          }}>{d.recipe}</span>
          {!d.skip && (
            <span style={{
              fontSize:"0.6875rem", fontWeight:500,
              padding:"2px 8px", borderRadius:9999,
              background: t.tagBg, color: t.tagText,
              border:`1px solid ${t.tagBorder}`,
            }}>
              Upcoming
            </span>
          )}
        </div>
      ))}
    </div>
  );
}

// ── Tweak defaults ────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "mood": "Warm",
  "queueStyle": "one-at-a-time"
}/*EDITMODE-END*/;

// ── App ───────────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const { mood, queueStyle } = tweaks;
  const t = THEMES[mood] || THEMES.Warm;

  const [queue, setQueue] = React.useState(UNRATED);
  const current = queue[0];

  const handleRate = (id, dir) => {
    setQueue(prev => prev.filter(r => r.id !== id));
  };
  const handleDismiss = (id) => {
    setQueue(prev => [...prev.filter(r => r.id !== id), prev.find(r => r.id === id)].filter(Boolean));
    // move to end
    setQueue(prev => {
      const item = prev.find(r => r.id === id);
      return item ? [...prev.filter(r => r.id !== id), item] : prev;
    });
    // For demo, just remove
    setQueue(prev => prev.filter(r => r.id !== id));
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100%", background: t.appBg, fontFamily:"'DM Sans', sans-serif" }}>

      {/* Status bar */}
      <div style={{
        height:36, flexShrink:0, background: t.headerBg,
        display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 20px",
      }}>
        <span style={{ fontSize:"0.875rem", fontWeight:600, color: t.heading }}>9:41</span>
        <div style={{ display:"flex", gap:6, alignItems:"center" }}>
          <svg width="16" height="12" viewBox="0 0 16 12" fill={t.statusColor}>
            <rect x="0" y="6" width="3" height="6" rx="1"/><rect x="4.5" y="4" width="3" height="8" rx="1"/>
            <rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="2.5" height="12" rx="1"/>
          </svg>
          <svg width="22" height="11" viewBox="0 0 22 11" fill="none">
            <rect x="0.5" y="0.5" width="18" height="10" rx="2.5" stroke={t.statusColor} strokeWidth="1"/>
            <rect x="2" y="2" width="14" height="7" rx="1.5" fill={t.statusColor}/>
            <path d="M20 3.5v4a2 2 0 0 0 0-4z" fill={t.statusColor}/>
          </svg>
        </div>
      </div>

      {/* App header */}
      <div style={{
        flexShrink:0, background: t.headerBg,
        padding:"8px 20px 10px",
        borderBottom:`1px solid ${t.headerBorder}`,
        display:"flex", alignItems:"center", justifyContent:"space-between",
      }}>
        <div style={{ display:"flex", alignItems:"baseline", gap:6 }}>
          <span style={{ fontSize:"1.25rem", fontWeight:700, letterSpacing:"-0.02em", color: t.heading }}>MealMate</span>
          <span style={{
            fontSize:"0.6875rem", fontWeight:500,
            background: t.pillBg, color: t.pillText,
            borderRadius:9999, padding:"1px 7px",
          }}>Week of Apr 28</span>
        </div>
        <div style={{
          width:30, height:30, borderRadius:"50%",
          background:`linear-gradient(135deg, ${C.secondary[200]}, ${C.secondary[400]})`,
          display:"flex", alignItems:"center", justifyContent:"center",
        }}>
          <span style={{ fontSize:"0.8125rem", fontWeight:600, color: C.secondary[800] }}>J</span>
        </div>
      </div>

      {/* Scrollable content */}
      <div style={{ flex:1, minHeight:0, overflowY:"auto", padding:"16px 16px 80px" }}>

        {/* Rating card — inline, not modal */}
        {queue.length > 0 && current && (
          <div style={{ marginBottom:16 }}>
            <RatingCard
              key={current.id}
              recipe={current}
              remaining={queue.length}
              onRate={handleRate}
              onDismiss={handleDismiss}
              t={t}
            />
          </div>
        )}

        {/* All rated state */}
        {queue.length === 0 && (
          <div style={{
            background: t.ratingCardBg,
            border:`1.5px solid ${t.ratingCardBorder}`,
            borderRadius:16, padding:"18px 16px",
            marginBottom:16,
            display:"flex", alignItems:"center", gap:12,
            boxShadow: shadow.sm,
          }}>
            <span style={{ fontSize:"1.5rem" }}>✅</span>
            <div>
              <span style={{ fontSize:"0.9375rem", fontWeight:600, color: t.heading, display:"block" }}>All meals rated!</span>
              <span style={{ fontSize:"0.8125rem", color: t.subtext }}>Your recommendations will keep improving.</span>
            </div>
          </div>
        )}

        {/* Remaining plan */}
        <ThisWeekCard t={t} />

      </div>

      {/* Bottom nav */}
      <nav style={{
        flexShrink:0, background: t.navBg,
        borderTop:`1px solid ${t.navBorder}`,
        display:"flex",
        boxShadow:`0 -1px 0 rgba(53,47,45,0.06)`,
      }}>
        {[
          { id:"home",     label:"Home",    Icon:IconHome },
          { id:"grocery",  label:"Grocery", Icon:IconList },
          { id:"settings", label:"Settings",Icon:IconSettings },
        ].map(({ id, label, Icon }) => {
          const active = id === "home";
          const color  = active ? t.navActive : t.navInactive;
          return (
            <button key={id} style={{
              flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:3,
              padding:"9px 0 6px", background:"transparent", border:"none", cursor:"pointer",
            }}>
              <Icon color={color}/>
              <span style={{ fontSize:"0.6875rem", fontWeight: active ? 600 : 400, color }}>
                {label}
              </span>
              {active && <span style={{ width:18, height:2, background: t.dotActive, borderRadius:2 }}/>}
            </button>
          );
        })}
      </nav>

      {/* Tweaks */}
      <TweaksPanel>
        <TweakSection label="Mood" />
        <TweakRadio options={["Calm","Warm","Bold"]} value={mood} onChange={v => setTweak("mood", v)} />
        <TweakSection label="Queue style" />
        <TweakRadio options={["one-at-a-time","stack"]} value={queueStyle} onChange={v => setTweak("queueStyle", v)} />
      </TweaksPanel>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
