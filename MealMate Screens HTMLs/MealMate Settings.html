<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MealMate — Kitchen Profile</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { margin: 0; background: #c9c2ba; }
    body { display: flex; justify-content: center; font-family: 'DM Sans', sans-serif; }
    #root {
      position: fixed; top: 0; bottom: 0;
      left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 390px;
      display: flex; flex-direction: column; overflow: hidden;
    }
    button, input, textarea { font-family: 'DM Sans', sans-serif; cursor: pointer; border: none; }
    ::-webkit-scrollbar { display: none; }
    * { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">


const C = {
  primary: { 50: "#f4f7f4", 100: "#e4ebe4", 200: "#c9d8c9", 300: "#a3bda3", 400: "#7a9e7a", 500: "#5a8a5a", 600: "#4a7a4a", 700: "#3d633d", 800: "#334f33", 900: "#2a422a" },
  secondary: { 50: "#fdf5f0", 100: "#fae8dc", 200: "#f4cdb5", 300: "#edae88", 400: "#e08c5a", 500: "#d4723e", 600: "#bf5c2e", 700: "#9e4a27" },
  neutral: { 0: "#ffffff", 50: "#faf8f6", 100: "#f3f0ec", 200: "#e8e3dd", 300: "#d4cdc4", 400: "#b5aca0", 500: "#968b7d", 600: "#7a6f63", 700: "#615851", 800: "#4a4340", 900: "#352f2d", 950: "#1e1b19" }
};
const shadow = {
  sm: "0 1px 3px rgba(53,47,45,0.07), 0 1px 2px rgba(53,47,45,0.04)",
  md: "0 4px 12px rgba(53,47,45,0.09), 0 2px 4px rgba(53,47,45,0.05)"
};

// ── Themes ─────────────────────────────────────────────────
const THEMES = {
  Calm: {
    appBg: C.neutral[50], headerBg: C.neutral[0], headerBorder: C.neutral[200],
    heading: C.neutral[900], subtext: C.neutral[500], micro: C.neutral[400],
    sectionBg: C.neutral[0], sectionBorder: C.neutral[200],
    sectionHeading: C.neutral[800], divider: C.neutral[100],
    chipBg: C.neutral[0], chipBorder: C.neutral[300], chipText: C.neutral[700],
    chipActiveBg: C.primary[600], chipActiveText: "#fff", chipActiveBorder: C.primary[600],
    tagBg: C.primary[50], tagBorder: C.primary[200], tagText: C.primary[700],
    inputBg: C.neutral[0], inputBorder: C.neutral[200], inputText: C.neutral[900],
    checkBg: C.primary[500], checkBorder: C.neutral[300],
    spiceBg: C.neutral[100], spiceBorder: C.neutral[200], spiceActive: C.primary[600],
    spiceActiveText: "#fff",
    excTagBg: C.neutral[100], excTagBorder: C.neutral[200], excTagText: C.neutral[700],
    stepperBg: C.neutral[100], stepperBorder: C.neutral[200], stepperText: C.neutral[700],
    stepperActiveBg: C.primary[600], stepperActiveText: "#fff",
    ctaFrom: C.primary[500], ctaTo: C.primary[600],
    ctaShadow: "rgba(74,122,74,0.28)",
    backColor: C.neutral[700], catLabel: C.neutral[500],
    saveBadgeBg: C.primary[100], saveBadgeText: C.primary[700]
  },
  Warm: {
    appBg: "#fdf5f0", headerBg: "#fffaf7", headerBorder: C.secondary[200],
    heading: C.neutral[900], subtext: C.neutral[600], micro: C.neutral[400],
    sectionBg: "#fffaf7", sectionBorder: C.secondary[200],
    sectionHeading: C.neutral[800], divider: C.secondary[100],
    chipBg: "#fffaf7", chipBorder: C.neutral[300], chipText: C.neutral[700],
    chipActiveBg: C.secondary[600], chipActiveText: "#fff", chipActiveBorder: C.secondary[600],
    tagBg: C.secondary[50], tagBorder: C.secondary[200], tagText: C.secondary[700],
    inputBg: "#fffaf7", inputBorder: C.secondary[200], inputText: C.neutral[900],
    checkBg: C.secondary[500], checkBorder: C.neutral[300],
    spiceBg: C.secondary[50], spiceBorder: C.secondary[200], spiceActive: C.secondary[500],
    spiceActiveText: "#fff",
    excTagBg: C.secondary[50], excTagBorder: C.secondary[200], excTagText: C.secondary[700],
    stepperBg: C.secondary[50], stepperBorder: C.secondary[200], stepperText: C.neutral[700],
    stepperActiveBg: C.secondary[500], stepperActiveText: "#fff",
    ctaFrom: C.secondary[400], ctaTo: C.secondary[600],
    ctaShadow: "rgba(191,92,46,0.28)",
    backColor: C.neutral[700], catLabel: C.neutral[500],
    saveBadgeBg: C.secondary[100], saveBadgeText: C.secondary[700]
  },
  Bold: {
    appBg: C.neutral[950], headerBg: "#1e1b19", headerBorder: "#3a342e",
    heading: "#f3f0ec", subtext: C.neutral[400], micro: C.neutral[600],
    sectionBg: "#2a2520", sectionBorder: "#4a433d",
    sectionHeading: "#e8e3dd", divider: "#3a342e",
    chipBg: "#2a2520", chipBorder: "#5a5248", chipText: C.neutral[300],
    chipActiveBg: C.primary[600], chipActiveText: "#fff", chipActiveBorder: C.primary[600],
    tagBg: "#2e3a2e", tagBorder: C.primary[700], tagText: C.primary[400],
    inputBg: "#2a2520", inputBorder: "#4a433d", inputText: "#f3f0ec",
    checkBg: C.primary[500], checkBorder: "#5a5248",
    spiceBg: "#332d28", spiceBorder: "#4a433d", spiceActive: C.primary[500],
    spiceActiveText: "#fff",
    excTagBg: "#332d28", excTagBorder: "#4a433d", excTagText: C.neutral[400],
    stepperBg: "#332d28", stepperBorder: "#4a433d", stepperText: C.neutral[300],
    stepperActiveBg: C.primary[500], stepperActiveText: "#fff",
    ctaFrom: C.primary[400], ctaTo: C.primary[600],
    ctaShadow: "rgba(90,138,90,0.35)",
    backColor: C.neutral[400], catLabel: C.neutral[500],
    saveBadgeBg: "#2e3a2e", saveBadgeText: C.primary[400]
  }
};

// ── Initial data ──────────────────────────────────────────
const INIT_STAPLES = {
  "Oils & Vinegars": ["Olive oil", "Sesame oil", "Balsamic vinegar", "Rice vinegar"],
  "Spices & Seasonings": ["Salt", "Black pepper", "Garlic powder", "Cumin", "Paprika", "Oregano"],
  "Grains & Pasta": ["White rice", "Pasta", "Oats", "Flour"],
  "Canned Goods": ["Diced tomatoes", "Black beans", "Coconut milk", "Chicken broth"],
  "Condiments": ["Soy sauce", "Honey", "Dijon mustard", "Hot sauce"],
  "Dairy & Eggs": ["Eggs", "Butter", "Parmesan"]
};
const TOOLS_LIST = [
{ id: "instant-pot", label: "Instant Pot", emoji: "⚡", on: true },
{ id: "air-fryer", label: "Air Fryer", emoji: "💨", on: true },
{ id: "slow-cooker", label: "Slow Cooker", emoji: "🍲", on: false },
{ id: "grill", label: "Grill", emoji: "🔥", on: false },
{ id: "wok", label: "Wok", emoji: "🥘", on: true },
{ id: "dutch-oven", label: "Dutch Oven", emoji: "🫕", on: true },
{ id: "food-processor", label: "Food Processor", emoji: "⚙️", on: false },
{ id: "stand-mixer", label: "Stand Mixer", emoji: "🍰", on: false },
{ id: "sous-vide", label: "Sous Vide", emoji: "🌡️", on: false },
{ id: "smoker", label: "Smoker", emoji: "💨", on: false },
{ id: "sheet-pans", label: "Sheet Pans", emoji: "🍪", on: true }];

const DIETARY_GOALS = [
{ id: "cholesterol", label: "Lower cholesterol" },
{ id: "lose-weight", label: "Lose weight" },
{ id: "muscle", label: "High protein" },
{ id: "heart", label: "Heart healthy" },
{ id: "low-sodium", label: "Low sodium" },
{ id: "balanced", label: "Balanced" }];

const RECIPE_STYLES = [
{ id: "quick", label: "Quick & easy", sub: "<30 min" },
{ id: "one-pan", label: "One-pan", sub: "" },
{ id: "meal-prep", label: "Meal prep", sub: "leftovers" },
{ id: "involved", label: "Weekend project", sub: "" },
{ id: "kid-friendly", label: "Kid-friendly", sub: "mild" }];

const SPICE_LEVELS = [
{ id: "none", label: "None", emoji: "🧊" },
{ id: "mild", label: "Mild", emoji: "🌿" },
{ id: "medium", label: "Medium", emoji: "🌶️" },
{ id: "hot", label: "Hot", emoji: "🔥" }];


// ── Icons ─────────────────────────────────────────────────
function IconX({ size = 11, color }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"><path d="M18 6L6 18M6 6l12 12" /></svg>;
}
function IconCheck({ size = 12, color = "#fff" }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5" /></svg>;
}
function IconChevronDown({ color, open }) {
  return <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" style={{ transform: open ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.2s" }}><path d="M6 9l6 6 6-6" /></svg>;
}
function IconChevronLeft({ color }) {
  return <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M15 18l-6-6 6-6" /></svg>;
}
function IconPlus({ color, size = 13 }) {
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"><path d="M12 5v14M5 12h14" /></svg>;
}

// ── Accordion section ─────────────────────────────────────
function AccordionSection({ title, badge, children, t, defaultOpen = true }) {
  const [open, setOpen] = React.useState(defaultOpen);
  return (
    <div style={{ background: t.sectionBg, borderRadius: 16, border: `1px solid ${t.sectionBorder}`, boxShadow: shadow.sm, overflow: "hidden", marginBottom: 12 }}>
      <button
        onClick={() => setOpen((o) => !o)}
        style={{ width: "100%", display: "flex", alignItems: "center", padding: "14px 16px", background: "transparent", cursor: "pointer", gap: 10 }}>
        
        <span style={{ flex: 1, fontSize: "0.9375rem", fontWeight: 700, color: t.sectionHeading, textAlign: "left" }}>{title}</span>
        {badge != null &&
        <span style={{ fontSize: "0.75rem", fontWeight: 600, padding: "1px 8px", borderRadius: 9999, background: t.tagBg, color: t.tagText, border: `1px solid ${t.tagBorder}` }}>
            {badge}
          </span>
        }
        <IconChevronDown color={t.subtext} open={open} />
      </button>
      {open && <div style={{ borderTop: `1px solid ${t.divider}` }}>{children}</div>}
    </div>);

}

// ── Staple chip ───────────────────────────────────────────
function StapleChip({ label, onRemove, t }) {
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 5,
      padding: "5px 8px 5px 11px", borderRadius: 9999,
      background: t.tagBg, border: `1.5px solid ${t.tagBorder}`, color: t.tagText,
      fontSize: "0.8125rem", fontWeight: 500
    }}>
      {label}
      <button onClick={onRemove} style={{ display: "flex", padding: 2, background: "none", border: "none", cursor: "pointer", opacity: 0.7 }}>
        <IconX size={10} color={t.tagText} />
      </button>
    </span>);

}

// ── Pref chip ─────────────────────────────────────────────
function PrefChip({ label, active, onToggle, t, sub }) {
  return (
    <button
      onClick={onToggle}
      style={{
        display: "inline-flex", alignItems: "center", gap: 5,
        padding: active ? "7px 13px 7px 9px" : "7px 13px",
        borderRadius: 9999,
        background: active ? t.chipActiveBg : t.chipBg,
        border: `1.5px solid ${active ? t.chipActiveBorder : t.chipBorder}`,
        color: active ? t.chipActiveText : t.chipText,
        fontSize: "0.8125rem", fontWeight: active ? 600 : 400,
        cursor: "pointer", whiteSpace: "nowrap",
        transition: "all 0.12s ease",
        boxShadow: active ? shadow.sm : "none"
      }}>
      
      {active && <span style={{ width: 16, height: 16, borderRadius: "50%", background: "rgba(255,255,255,0.22)", display: "inline-flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><IconCheck size={10} /></span>}
      {label}
      {sub && !active && <span style={{ fontSize: "0.7rem", opacity: 0.6 }}>· {sub}</span>}
    </button>);

}

// ── Tool row ──────────────────────────────────────────────
function ToolRow({ tool, onToggle, t, isLast }) {
  return (
    <button
      onClick={onToggle}
      style={{
        width: "100%", display: "flex", alignItems: "center",
        padding: "13px 16px",
        background: "transparent", cursor: "pointer", gap: 12,
        borderBottom: isLast ? "none" : `1px solid ${t.divider}`
      }}>
      
      <span style={{ fontSize: "1.2rem", lineHeight: 1, flexShrink: 0 }}>{tool.emoji}</span>
      <span style={{ flex: 1, fontSize: "0.9375rem", fontWeight: tool.on ? 500 : 400, color: tool.on ? t.heading : t.subtext, textAlign: "left" }}>
        {tool.label}
      </span>
      <div style={{
        width: 24, height: 24, borderRadius: 7, flexShrink: 0,
        background: tool.on ? t.checkBg : "transparent",
        border: `2px solid ${tool.on ? t.checkBg : t.checkBorder}`,
        display: "flex", alignItems: "center", justifyContent: "center",
        transition: "all 0.15s ease"
      }}>
        {tool.on && <IconCheck size={12} />}
      </div>
    </button>);

}

// ── Spice selector ────────────────────────────────────────
function SpiceSelector({ value, onChange, t }) {
  return (
    <div style={{ display: "flex", gap: 0, background: t.spiceBg, border: `1.5px solid ${t.spiceBorder}`, borderRadius: 12, padding: 4, margin: "0 16px 14px" }}>
      {SPICE_LEVELS.map((level) => {
        const active = value === level.id;
        return (
          <button key={level.id} onClick={() => onChange(level.id)} style={{
            flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3,
            padding: "9px 4px 7px", borderRadius: 9, border: "none", cursor: "pointer",
            background: active ? t.spiceActive : "transparent",
            transition: "all 0.15s ease", boxShadow: active ? shadow.sm : "none"
          }}>
            <span style={{ fontSize: "1.1rem", lineHeight: 1 }}>{level.emoji}</span>
            <span style={{ fontSize: "0.7rem", fontWeight: active ? 700 : 400, color: active ? t.spiceActiveText : t.subtext }}>
              {level.label}
            </span>
          </button>);

      })}
    </div>);

}

// ── Tweak defaults ────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "mood": "Warm"
} /*EDITMODE-END*/;

// ── App ───────────────────────────────────────────────────
function App() {
  const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const t = THEMES[tweaks.mood] || THEMES.Warm;

  // State
  const [staples, setStaples] = React.useState(INIT_STAPLES);
  const [tools, setTools] = React.useState(TOOLS_LIST);
  const [goals, setGoals] = React.useState(new Set(["muscle", "balanced"]));
  const [styles, setStyles] = React.useState(new Set(["quick", "one-pan", "kid-friendly"]));
  const [spice, setSpice] = React.useState("mild");
  const [exclusions, setExclusions] = React.useState(["mushrooms", "shellfish"]);
  const [serving, setServing] = React.useState(4);
  const [addInputs, setAddInputs] = React.useState({});
  const [exclInput, setExclInput] = React.useState("");
  const [saved, setSaved] = React.useState(false);

  const toggleSet = (setter, id) => setter((prev) => {
    const n = new Set(prev);n.has(id) ? n.delete(id) : n.add(id);return n;
  });

  const removeStaple = (cat, item) => setStaples((prev) => ({
    ...prev, [cat]: prev[cat].filter((i) => i !== item)
  }));

  const addStaple = (cat) => {
    const val = (addInputs[cat] || "").trim();
    if (!val) return;
    setStaples((prev) => ({ ...prev, [cat]: [...prev[cat], val] }));
    setAddInputs((prev) => ({ ...prev, [cat]: "" }));
  };

  const toggleTool = (id) => setTools((prev) => prev.map((t) => t.id === id ? { ...t, on: !t.on } : t));

  const addExclusion = (raw) => {
    const parts = raw.split(/[,;]+/).map((s) => s.trim()).filter(Boolean);
    setExclusions((prev) => [...prev, ...parts.filter((p) => !prev.includes(p))]);
    setExclInput("");
  };

  const handleSave = () => {
    setSaved(true);
    setTimeout(() => setSaved(false), 2000);
  };

  const stapleCount = Object.values(staples).flat().length;
  const toolCount = tools.filter((t) => t.on).length;

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", background: t.appBg, fontFamily: "'DM Sans', sans-serif" }}>

      {/* Status bar */}
      <div style={{ height: 36, flexShrink: 0, background: t.headerBg, display: "flex", alignItems: "center", justifyContent: "space-between", padding: "0 20px" }}>
        <span style={{ fontSize: "0.875rem", fontWeight: 600, color: t.heading }}>9:41</span>
        <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
          <svg width="16" height="12" viewBox="0 0 16 12" fill={C.neutral[500]}><rect x="0" y="6" width="3" height="6" rx="1" /><rect x="4.5" y="4" width="3" height="8" rx="1" /><rect x="9" y="2" width="3" height="10" rx="1" /><rect x="13.5" y="0" width="2.5" height="12" rx="1" /></svg>
          <svg width="22" height="11" viewBox="0 0 22 11" fill="none"><rect x="0.5" y="0.5" width="18" height="10" rx="2.5" stroke={C.neutral[500]} strokeWidth="1" /><rect x="2" y="2" width="14" height="7" rx="1.5" fill={C.neutral[500]} /><path d="M20 3.5v4a2 2 0 0 0 0-4z" fill={C.neutral[500]} /></svg>
        </div>
      </div>

      {/* Header */}
      <div style={{ flexShrink: 0, background: t.headerBg, padding: "10px 20px 12px", borderBottom: `1px solid ${t.headerBorder}`, display: "flex", alignItems: "center", gap: 12 }}>
        <button style={{ display: "flex", alignItems: "center", background: "none", border: "none", padding: 0, cursor: "pointer" }}>
          <IconChevronLeft color={t.backColor} />
        </button>
        <div style={{ flex: 1 }}>
          <h1 style={{ fontSize: "1.125rem", fontWeight: 700, letterSpacing: "-0.02em", color: t.heading, lineHeight: 1 }}>Kitchen Profile</h1>
          <p style={{ fontSize: "0.75rem", color: t.subtext, marginTop: 2 }}>{stapleCount} staples · {toolCount} tools</p>
        </div>
        {saved ?
        <span style={{ fontSize: "0.8125rem", fontWeight: 600, padding: "4px 12px", borderRadius: 9999, background: t.saveBadgeBg, color: t.saveBadgeText }}>
            ✓ Saved
          </span> :

        <button
          onClick={handleSave}
          style={{
            padding: "7px 16px", borderRadius: 10,
            background: `linear-gradient(160deg, ${t.ctaFrom} 0%, ${t.ctaTo} 100%)`,
            color: "#fff", fontSize: "0.875rem", fontWeight: 600,
            boxShadow: `0 3px 10px ${t.ctaShadow}`,
            transition: "all 0.1s ease"
          }}>
          
            Save
          </button>
        }
      </div>

      {/* Scroll */}
      <div style={{ flex: 1, minHeight: 0, overflowY: "auto", padding: "14px 14px 32px" }}>

        {/* ── Serving size ── */}
        <AccordionSection title="Default serving size" t={t}>
          <div style={{ padding: "16px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div style={{ width: "180.6875px" }}>
              <span style={{ fontSize: "0.9375rem", color: t.heading, fontWeight: 500 }}>Servings per meal</span>
              <p style={{ fontSize: "0.8125rem", color: t.subtext, marginTop: 2 }}>Scales ingredient quantities across all recipes</p>
            </div>
            {/* Stepper */}
            <div style={{ display: "flex", alignItems: "center", gap: 0, background: t.stepperBg, border: `1.5px solid ${t.stepperBorder}`, borderRadius: 12, overflow: "hidden" }}>
              <button
                onClick={() => setServing((s) => Math.max(1, s - 1))}
                style={{ width: 40, height: 40, display: "flex", alignItems: "center", justifyContent: "center", background: "transparent", fontSize: "1.25rem", color: t.stepperText, fontWeight: 300 }}>
                −</button>
              <span style={{ width: 36, textAlign: "center", fontSize: "1rem", fontWeight: 700, color: t.heading }}>{serving}</span>
              <button
                onClick={() => setServing((s) => Math.min(12, s + 1))}
                style={{ width: 40, height: 40, display: "flex", alignItems: "center", justifyContent: "center", background: "transparent", fontSize: "1.25rem", color: t.stepperText, fontWeight: 300 }}>
                +</button>
            </div>
          </div>
        </AccordionSection>

        {/* ── Staple items ── */}
        <AccordionSection title="Staple items" badge={stapleCount} t={t}>
          <div style={{ padding: "14px 16px 8px" }}>
            {Object.entries(staples).map(([cat, items]) =>
            <div key={cat} style={{ marginBottom: 14 }}>
                <span style={{ fontSize: "0.75rem", fontWeight: 600, color: t.catLabel, letterSpacing: "0.03em", textTransform: "uppercase", display: "block", marginBottom: 8 }}>
                  {cat}
                </span>
                <div style={{ display: "flex", flexWrap: "wrap", gap: 7 }}>
                  {items.map((item) =>
                <StapleChip key={item} label={item} onRemove={() => removeStaple(cat, item)} t={t} />
                )}
                  {/* Inline add */}
                  <div style={{
                  display: "inline-flex", alignItems: "center", gap: 4,
                  padding: "4px 8px 4px 6px", borderRadius: 9999,
                  border: `1.5px dashed ${t.inputBorder}`,
                  background: t.inputBg
                }}>
                    <IconPlus color={t.subtext} size={11} />
                    <input
                    value={addInputs[cat] || ""}
                    onChange={(e) => setAddInputs((prev) => ({ ...prev, [cat]: e.target.value }))}
                    onKeyDown={(e) => {if (e.key === "Enter") addStaple(cat);}}
                    onBlur={() => addStaple(cat)}
                    placeholder="Add…"
                    style={{
                      width: Math.max(36, ((addInputs[cat] || "").length + 3) * 7),
                      maxWidth: 90, border: "none", background: "transparent", outline: "none",
                      fontSize: "0.8125rem", color: t.inputText
                    }} />
                  
                  </div>
                </div>
              </div>
            )}
          </div>
        </AccordionSection>

        {/* ── Kitchen tools ── */}
        <AccordionSection title="Kitchen tools" badge={`${toolCount} active`} t={t}>
          {tools.map((tool, i) =>
          <ToolRow key={tool.id} tool={tool} onToggle={() => toggleTool(tool.id)} t={t} isLast={i === tools.length - 1} />
          )}
        </AccordionSection>

        {/* ── Household preferences ── */}
        <AccordionSection title="Household preferences" t={t}>

          {/* Dietary goals */}
          <div style={{ padding: "14px 16px 0" }}>
            <span style={{ fontSize: "0.75rem", fontWeight: 600, color: t.catLabel, letterSpacing: "0.03em", textTransform: "uppercase", display: "block", marginBottom: 10 }}>
              Dietary goals
            </span>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 18 }}>
              {DIETARY_GOALS.map((g) =>
              <PrefChip key={g.id} label={g.label} active={goals.has(g.id)} onToggle={() => toggleSet(setGoals, g.id)} t={t} />
              )}
            </div>

            {/* Recipe style */}
            <span style={{ fontSize: "0.75rem", fontWeight: 600, color: t.catLabel, letterSpacing: "0.03em", textTransform: "uppercase", display: "block", marginBottom: 10 }}>
              Recipe style
            </span>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 18 }}>
              {RECIPE_STYLES.map((s) =>
              <PrefChip key={s.id} label={s.label} sub={s.sub} active={styles.has(s.id)} onToggle={() => toggleSet(setStyles, s.id)} t={t} />
              )}
            </div>

            {/* Spice */}
            <span style={{ fontSize: "0.75rem", fontWeight: 600, color: t.catLabel, letterSpacing: "0.03em", textTransform: "uppercase", display: "block", marginBottom: 10 }}>
              Spice tolerance
            </span>
          </div>
          <SpiceSelector value={spice} onChange={setSpice} t={t} />

          {/* Exclusions */}
          <div style={{ padding: "0 16px 16px" }}>
            <span style={{ fontSize: "0.75rem", fontWeight: 600, color: t.catLabel, letterSpacing: "0.03em", textTransform: "uppercase", display: "block", marginBottom: 10 }}>
              Ingredients to avoid
            </span>
            <div style={{
              background: t.inputBg, border: `1.5px solid ${t.inputBorder}`,
              borderRadius: 12, padding: "10px 12px",
              display: "flex", flexDirection: "column", gap: 8
            }}>
              {exclusions.length > 0 &&
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                  {exclusions.map((exc) =>
                <span key={exc} style={{
                  display: "inline-flex", alignItems: "center", gap: 5,
                  padding: "3px 8px 3px 10px", borderRadius: 9999,
                  background: t.excTagBg, border: `1px solid ${t.excTagBorder}`,
                  fontSize: "0.8125rem", fontWeight: 500, color: t.excTagText
                }}>
                      {exc}
                      <button onClick={() => setExclusions((prev) => prev.filter((x) => x !== exc))} style={{ display: "flex", padding: 1, background: "none", border: "none", cursor: "pointer", opacity: 0.6 }}>
                        <IconX size={10} color={t.excTagText} />
                      </button>
                    </span>
                )}
                </div>
              }
              <input
                value={exclInput}
                onChange={(e) => setExclInput(e.target.value)}
                onKeyDown={(e) => {if ((e.key === "Enter" || e.key === ",") && exclInput.trim()) {e.preventDefault();addExclusion(exclInput);}}}
                onBlur={() => {if (exclInput.trim()) addExclusion(exclInput);}}
                placeholder={exclusions.length ? "Add more…" : "e.g. mushrooms, shellfish"}
                style={{ border: "none", background: "transparent", outline: "none", fontSize: "0.875rem", color: t.inputText, width: "100%" }} />
              
            </div>
          </div>
        </AccordionSection>

      </div>

      {/* Tweaks */}
      <TweaksPanel>
        <TweakSection label="Mood" />
        <TweakRadio options={["Calm", "Warm", "Bold"]} value={tweaks.mood} onChange={(v) => setTweak("mood", v)} />
      </TweaksPanel>

    </div>);

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
